   1. TIEN ICH NGAY THANG (thay the date-fns, khong can them thu vien)

const pad2 = (n) => String(n).padStart(2, '0')
const toISODate = (d) => `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`
const startOfMonth = (d) => new Date(d.getFullYear(), d.getMonth(), 1)
const addMonths = (d, delta) => new Date(d.getFullYear(), d.getMonth() + delta, d.getDate())
const startOfWeekMonday = (d) => {
  const day = d.getDay()
  const diff = day === 0 ? -6 : 1 - day
  const res = new Date(d)
  res.setDate(d.getDate() + diff)
  return res
}
const quarterOf = (month) => Math.ceil(month / 3)

function periodKey(row, groupBy) {
  const d = row.ngay_bat_dau ? new Date(row.ngay_bat_dau) : null
  switch (groupBy) {
    case 'day':
      return d && !isNaN(d) ? toISODate(d) : 'N/A'
    case 'week':
      return d && !isNaN(d) ? toISODate(startOfWeekMonday(d)) : 'N/A'
    case 'quarter':
      return `${row.nam}-Q${quarterOf(row.thang)}`
    case 'year':
      return `${row.nam}`
    case 'month':
    default:
      return `${row.nam}-${pad2(row.thang)}`
  }
}

function periodDisplay(key, groupBy) {
  if (key === 'N/A') return 'N/A'
  switch (groupBy) {
    case 'day': { const [y, m, d] = key.split('-'); return `${d}/${m}/${y}` }
    case 'week': { const [y, m, d] = key.split('-'); return `Tuần ${d}/${m}/${y}` }
    case 'quarter': return key.replace('-', ' ')
    case 'year': return key
    case 'month':
    default: { const [y, m] = key.split('-'); return `${m}/${y}` }
  }
}

/* -----------------------------------------------------------------------

const COLUMNS = [

  { header: 'Vị trí', key: 'vi_tri', type: 'text' },
  { header: 'Từ khóa / Vị trí', key: 'tu_khoa_vi_tri', type: 'text' },
  { header: 'Loại từ khóa', key: 'loai_tu_khoa', type: 'text' },
  { header: 'Ngày bắt đầu', key: 'ngay_bat_dau', type: 'date' },
  { header: 'Ngày kết thúc', key: 'ngay_ket_thuc', type: 'text' },
  { header: '(Cột Shopee ẩn)', key: 'cot_an', type: 'float' },
  { header: 'Số lượt xem', key: 'so_luot_xem', type: 'int' },
  { header: 'Số lượt click', key: 'so_luot_click', type: 'int' },
  { header: 'Tỷ Lệ Click', key: 'ty_le_click', type: 'float' },
  { header: 'Lượt chuyển đổi', key: 'luot_chuyen_doi', type: 'int' },
  { header: 'Lượt chuyển đổi trực tiếp', key: 'luot_chuyen_doi_truc_tiep', type: 'int' },
  { header: 'Tỷ lệ chuyển đổi', key: 'ty_le_chuyen_doi', type: 'float' },
  { header: 'Tỷ lệ chuyển đổi trực tiếp', key: 'ty_le_chuyen_doi_truc_tiep', type: 'float' },
  { header: 'Chi phí cho mỗi lượt chuyển đổi', key: 'cpa', type: 'float' },
  { header: 'Chi phí cho mỗi lượt chuyển đổi trực tiếp', key: 'cpa_truc_tiep', type: 'float' },
  { header: 'Sản phẩm đã bán', key: 'san_pham_da_ban', type: 'int' },
  { header: 'Sản phẩm đã bán trực tiếp', key: 'san_pham_da_ban_truc_tiep', type: 'int' },
  { header: 'Doanh số', key: 'doanh_so', type: 'float' },
  { header: 'Doanh số trực tiếp', key: 'doanh_so_truc_tiep', type: 'float' },
  { header: 'Chi phí', key: 'chi_phi', type: 'float' },
  { header: 'ROAS', key: 'roas', type: 'float' },
  { header: 'ROAS trực tiếp', key: 'roas_truc_tiep', type: 'float' },
  { header: 'ACOS', key: 'acos', type: 'float' },
  { header: 'ACOS trực tiếp', key: 'acos_truc_tiep', type: 'float' },
  { header: 'Lượt xem Sản phẩm', key: 'luot_xem_san_pham', type: 'int' },
  { header: 'Lượt clicks Sản phẩm', key: 'luot_click_san_pham', type: 'int' },
  { header: 'Tỷ lệ Click Sản phẩm', key: 'ty_le_click_san_pham', type: 'float' }
]
const REQUIRED_KEYS = ['thang', 'nam', 'ten_dich_vu_hien_thi']

function toIntOrZero(v) {
  if (v === null || v === undefined || v === '' || v === '-') return 0
  const n = Number(String(v).replace(/,/g, '').trim())
  return Number.isFinite(n) ? Math.trunc(n) : 0
}
function toFloatOrZero(v) {
  if (v === null || v === undefined || v === '' || v === '-') return 0
  const n = Number(String(v).replace(/,/g, '').trim())
  return Number.isFinite(n) ? n : 0
}
function toDateOrNull(v) {
  if (!v || v === '-') return null
  if (v instanceof Date) return toISODate(v)
  const d = new Date(v)
  return isNaN(d) ? null : toISODate(d)
}
// Chuan hoa Unicode ve dang NFC (dau lien). Mot so nguon xuat file Excel
// (vd may Mac, mot so ban Shopee Seller Center) luu tieng Viet o dang NFD
// (dau roi: "tr" + "ự" tach thanh "ư" + dau nang rieng) - nhin GIONG HET
// NFC nhung so sanh chuoi (===) se bi sai khac, khien app bao "thieu cot"
// du header nhin dung. Luon .normalize('NFC') truoc khi so sanh/luu.
function nfc(v) {
  return typeof v === 'string' ? v.normalize('NFC') : v
}
function toTextOrNull(v) {
  if (v === null || v === undefined || v === '') return null
  return nfc(String(v).trim())
}
const CASTERS = { int: toIntOrZero, float: toFloatOrZero, date: toDateOrNull, text: toTextOrNull }

async function readRawRows(file) {
  const isCsv = file.name.toLowerCase().endsWith('.csv')
  if (isCsv) {
    const text = await file.text()
    return Papa.parse(text, { skipEmptyLines: true }).data
  }
  const buffer = await file.arrayBuffer()
  const wb = XLSX.read(buffer, { type: 'array', cellDates: true })
  const sheet = wb.Sheets[wb.SheetNames[0]]
  return XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true, defval: null })
}

function findHeaderRowIndex(rows, columns = COLUMNS) {
  const first = nfc(columns[0].header), second = nfc(columns[1].header)
  for (let i = 0; i < Math.min(rows.length, 20); i++) {
    const row = rows[i] || []
    if (nfc(String(row[0] ?? '').trim()) === first && nfc(String(row[1] ?? '').trim()) === second) return i
  }
  return -1
}

/** Doc + validate + chuan hoa file thanh danh sach row san sang ghi Supabase */
async function parseShopeeAdsFile(file, shopName) {
  const rawRows = await readRawRows(file)
  const headerIdx = findHeaderRowIndex(rawRows)

  if (headerIdx === -1) {
    return {
      headerValid: false,
      missingColumns: COLUMNS.map((c) => c.header),
      rows: [],
      errors: [{ row: 0, message: 'Không tìm thấy dòng tiêu đề đúng định dạng Shopee (Tháng, Năm, ...).' }],
      totalDataRows: 0
    }
  }

  const headerRow = (rawRows[headerIdx] || []).map((h) => nfc(String(h ?? '').trim()))
  const missingColumns = COLUMNS.filter((c) => !headerRow.includes(nfc(c.header))).map((c) => c.header)
  const headerValid = missingColumns.length === 0

  const colIndexByKey = {}
  COLUMNS.forEach((c) => { colIndexByKey[c.key] = headerRow.indexOf(nfc(c.header)) })

  const dataRows = rawRows.slice(headerIdx + 1).filter((r) => r && r.some((cell) => cell !== null && cell !== undefined && cell !== ''))

  const rows = [], errors = []
  dataRows.forEach((raw, i) => {
    const rowNum = headerIdx + 2 + i
    const obj = { shop_name: shopName, source_file_name: file.name }
    let hasError = false
    COLUMNS.forEach((col) => {
      const idx = colIndexByKey[col.key]
      obj[col.key] = CASTERS[col.type](idx >= 0 ? raw[idx] : null)
    })
    REQUIRED_KEYS.forEach((key) => {
      if (obj[key] === null || obj[key] === undefined || obj[key] === '') {
        hasError = true
        errors.push({ row: rowNum, message: `Thiếu giá trị bắt buộc cho cột "${key}".` })
      }
    })
    if (!hasError) rows.push(obj)
  })

  return { headerValid, missingColumns, rows, errors, totalDataRows: dataRows.length }
}

/* -----------------------------------------------------------------------
   3. DONG BO LEN SUPABASE (Insert moi / Update da ton tai, khong trung)
   ----------------------------------------------------------------------- */
const TABLE = 'ads_campaign_reports'
const BATCH_SIZE = 300

async function syncRowsToSupabase(rows, { fileName, shopName, userId, onProgress }) {
  const totalRows = rows.length

  const { data: historyRow, error: historyError } = await sb
    .from('upload_history')
    .insert({ file_name: fileName, shop_name: shopName, uploaded_by: userId, total_rows: totalRows, status: 'processing' })
    .select().single()
  if (historyError) throw historyError

  const { count: countBefore } = await sb.from(TABLE).select('id', { count: 'exact', head: true }).eq('shop_name', shopName)

  let processed = 0
  const failedBatches = []
  for (let i = 0; i < rows.length; i += BATCH_SIZE) {
    const batch = rows.slice(i, i + BATCH_SIZE)
    const { error } = await sb.from(TABLE).upsert(batch, { onConflict: 'row_key', ignoreDuplicates: false })
    if (error) failedBatches.push({ batchStart: i, batchSize: batch.length, message: error.message })
    processed += batch.length
    onProgress?.(Math.round((processed / totalRows) * 100))
  }

  const { count: countAfter } = await sb.from(TABLE).select('id', { count: 'exact', head: true }).eq('shop_name', shopName)
  const insertedRows = Math.max(0, (countAfter ?? 0) - (countBefore ?? 0))
  // Moi batch loi thi TOAN BO dong trong batch do khong duoc ghi - tinh dung
  // errorRows tu kich thuoc cac batch loi (truoc day bi hardcode = 0, khien
  // batch loi bi tinh nham thanh "Cap nhat thanh cong" - da sua).
  const errorRows = failedBatches.reduce((sum, b) => sum + b.batchSize, 0)
  const updatedRows = Math.max(0, totalRows - insertedRows - errorRows)
  const status = failedBatches.length === 0 ? 'success' : (insertedRows + updatedRows > 0 ? 'partial' : 'failed')
  const errorMessage = failedBatches.length ? failedBatches[0].message : null

  await sb.from('upload_history').update({
    inserted_rows: insertedRows, updated_rows: updatedRows, error_rows: errorRows,
    status, error_detail: failedBatches.length ? { failedBatches } : null, finished_at: new Date().toISOString()
  }).eq('id', historyRow.id)

  return { insertedRows, updatedRows, errorRows, status, errorMessage }
}

async function fetchUploadHistory(limit = 20) {
  const { data, error } = await sb.from('upload_history').select('*').order('created_at', { ascending: false }).limit(limit)
  if (error) throw error
  return data
}

/* -----------------------------------------------------------------------
   4. TINH TOAN KPI / NHOM DU LIEU
   Ty le (CTR, CVR, ROAS, ACOS, CPC, CPM, CPA) tinh lai tu TONG tuyet doi,
   khong lay trung binh cong tung dong.
   ----------------------------------------------------------------------- */
const sumBy = (rows, key) => rows.reduce((s, r) => s + (Number(r[key]) || 0), 0)

function computeKpis(rows) {
  const impressions = sumBy(rows, 'so_luot_xem')
  const clicks = sumBy(rows, 'so_luot_click')
  const conversions = sumBy(rows, 'luot_chuyen_doi')
  const orders = sumBy(rows, 'san_pham_da_ban')
  const revenue = sumBy(rows, 'doanh_so')
  const cost = sumBy(rows, 'chi_phi')
  const addToCart = sumBy(rows, 'add_to_cart')

  return {
    impressions, clicks, conversions, orders, revenue, cost, addToCart,
    ctr: impressions > 0 ? (clicks / impressions) * 100 : 0,
    cvr: clicks > 0 ? (conversions / clicks) * 100 : 0,
    cpc: clicks > 0 ? cost / clicks : 0,
    cpm: impressions > 0 ? (cost / impressions) * 1000 : 0,
    cpa: conversions > 0 ? cost / conversions : 0,
    roas: cost > 0 ? revenue / cost : 0,
    acos: revenue > 0 ? (cost / revenue) * 100 : 0
  }
}

function groupAndCompute(rows, keyFn) {
  const map = new Map()
  rows.forEach((r) => {
    const key = keyFn(r)
    if (!map.has(key)) map.set(key, [])
    map.get(key).push(r)
  })
  return Array.from(map.entries())
    .map(([label, groupRows]) => ({ label, ...computeKpis(groupRows), count: groupRows.length }))
    .sort((a, b) => (a.label > b.label ? 1 : -1))
}

function topN(rows, keyFn, n, sortKey) {
  return groupAndCompute(rows, keyFn).sort((a, b) => b[sortKey] - a[sortKey]).slice(0, n)
}

const formatVND = (v) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND', maximumFractionDigits: 0 }).format(v || 0)
const formatNumber = (v) => new Intl.NumberFormat('vi-VN').format(Math.round(v || 0))
const formatPercent = (v) => `${(v || 0).toFixed(2)}%`

async function initAuth() {
  const { data } = await sb.auth.getSession()
  currentSession = data.session
  sb.auth.onAuthStateChange((_event, session) => {
    currentSession = session
    renderAuthState()
  })
  renderAuthState()
}

function renderAuthState() {
  const loginScreen = document.getElementById('loginScreen')
  const appShell = document.getElementById('appShell')
  if (currentSession) {
    loginScreen.classList.add('hidden-important')
    appShell.classList.remove('hidden-important')
    document.getElementById('userEmailLabel').textContent = currentSession.user.email
    goToPage('dashboard')
  } else {
    appShell.classList.add('hidden-important')
    loginScreen.classList.remove('hidden-important')
  }
}

  const email = document.getElementById('loginEmail').value
  const password = document.getElementById('loginPassword').value
  const errorBox = document.getElementById('loginError')
  const btn = document.getElementById('loginSubmitBtn')
  errorBox.classList.add('hidden-important')
  btn.disabled = true
  btn.textContent = 'Đang đăng nhập...'
  const { error } = await sb.auth.signInWithPassword({ email, password })
  btn.disabled = false
  btn.textContent = 'Đăng nhập'
  if (error) {
    errorBox.textContent = 'Sai email hoặc mật khẩu.'
    errorBox.classList.remove('hidden-important')
  }
})

document.getElementById('logoutBtn').addEventListener('click', () => sb.auth.signOut())

function initTheme() {
  const saved = localStorage.getItem('sab-theme') || 'light'
  applyTheme(saved)
  document.getElementById('themeToggleBtn').addEventListener('click', () => {
    const isDark = document.documentElement.classList.contains('dark')
    applyTheme(isDark ? 'light' : 'dark')
  })
}
function applyTheme(theme) {
  document.documentElement.classList.toggle('dark', theme === 'dark')
  document.getElementById('themeToggleBtn').textContent = theme === 'dark' ? '☀️ Light' : '🌙 Dark'
  localStorage.setItem('sab-theme', theme)
}

function goToPage(page) {
  document.querySelectorAll('.page-section').forEach((el) => el.classList.add('hidden-important'))
  document.getElementById(`page-${page}`).classList.remove('hidden-important')
  document.querySelectorAll('.nav-btn').forEach((btn) => {
    const active = btn.dataset.page === page
    btn.classList.toggle('bg-brand', active)
    btn.classList.toggle('text-white', active)
    btn.classList.toggle('text-gray-500', !active)
    btn.classList.toggle('dark:text-gray-400', !active)
  })
  // Lan dau vao trang thi dung skeleton HTML; nhung LAN NAO cung phai tai
  // lai du lieu moi nhat (truoc day chi fetch 1 lan duy nhat, nen sau khi
  // Upload xong quay lai Dashboard van thay trong vi du lieu cu da cache).
  if (page === 'dashboard') { if (!dashboardInitialized) initDashboardPage(); else loadDashboardData() }
  if (page === 'upload') { if (!uploadInitialized) initUploadPage(); else loadUploadHistory() }
  if (page === 'mediaplan') { if (!mediaPlanInitialized) initMediaPlanPage(); else loadMediaPlanList() }
  if (page === 'adsanalysis') { if (!adsAnalysisInitialized) initAdsAnalysisPage(); else loadAdsAnalysisData() }
}
document.querySelectorAll('.nav-btn').forEach((btn) => btn.addEventListener('click', () => goToPage(btn.dataset.page)))

function initDashboardPage() {
  dashboardInitialized = true
  const container = document.getElementById('page-dashboard')
  container.innerHTML = dashboardSkeletonHTML()

  const to = new Date()
  const from = addMonths(startOfMonth(to), -5)
  document.getElementById('f_from').value = toISODate(from)
  document.getElementById('f_to').value = toISODate(to)

  ;['f_from', 'f_to'].forEach((id) => document.getElementById(id).addEventListener('change', loadDashboardData))
  ;['f_groupBy', 'f_shop', 'f_campaign', 'f_product'].forEach((id) => document.getElementById(id).addEventListener('change', renderDashboard))
  document.getElementById('f_refreshBtn').addEventListener('click', loadDashboardData)

  document.getElementById('cmp_periodType').addEventListener('change', () => { populateComparisonSelectors(); renderComparison() })
  ;['cmp_p1', 'cmp_p2', 'cmp_p3'].forEach((id) => document.getElementById(id).addEventListener('change', renderComparison))

  loadDashboardData()
}

async function loadDashboardData() {
  const loadingEl = document.getElementById('dashLoading')
  const errorEl = document.getElementById('dashError')
  const contentEl = document.getElementById('dashContent')
  loadingEl.classList.remove('hidden-important')
  errorEl.classList.add('hidden-important')
  contentEl.classList.add('hidden-important')

  const from = document.getElementById('f_from').value
  const to = document.getElementById('f_to').value
  const monthStart = toISODate(startOfMonth(new Date(from)))
  const monthEnd = toISODate(startOfMonth(new Date(to)))

  const { data, error } = await sb.from('v_ads_computed').select('*').gte('period_date', monthStart).lte('period_date', monthEnd).limit(20000)

  loadingEl.classList.add('hidden-important')
  if (error) {
    errorEl.textContent = 'Lỗi tải dữ liệu: ' + error.message
    errorEl.classList.remove('hidden-important')
    return
  }
  dashRawRows = data || []
  populateFilterOptions()
  contentEl.classList.remove('hidden-important')
  renderDashboard()
}

function populateFilterOptions() {
  const shops = [...new Set(dashRawRows.map((r) => r.shop_name).filter(Boolean))].sort()
  const campaigns = [...new Set(dashRawRows.map((r) => r.ten_dich_vu_hien_thi).filter(Boolean))].sort()
  fillSelect('f_shop', shops)
  fillSelect('f_campaign', campaigns)
  fillSelectWithLabel('f_product', buildProductOptions(dashRawRows))
}
function fillSelect(id, values) {
  const el = document.getElementById(id)
  const current = el.value
  el.innerHTML = '<option value="">Tất cả</option>' + values.map((v) => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('')
  if (values.includes(current)) el.value = current
}

// Du lieu goc chi co "Ma san pham" (day so, kho nhan biet). Xay dung nhan
// hien thi de nguoi dung chon theo TEN san pham/chien dich cho de tim, gia
// tri filter (ma_san_pham) van giu nguyen phia sau de loc chinh xac.
function buildProductOptions(rows) {
  const map = new Map()
  rows.forEach((r) => {
    const code = r.ma_san_pham
    if (!code || code === '-') return
    if (!map.has(code)) {
      const name = r.ten_dich_vu_hien_thi || r.noi_dung_dich_vu_hien_thi || code
      map.set(code, name)
    }
  })
  return Array.from(map.entries()).sort((a, b) => a[1].localeCompare(b[1], 'vi'))
}

function fillSelectWithLabel(id, entries) {
  const el = document.getElementById(id)
  const current = el.value
  el.innerHTML = '<option value="">Tất cả</option>' + entries.map(([value, label]) => {
    const shortLabel = label.length > 60 ? label.slice(0, 60) + '…' : label
    return `<option value="${escapeHtml(value)}" title="${escapeHtml(label)}">${escapeHtml(shortLabel)}</option>`
  }).join('')
  if (entries.some(([value]) => value === current)) el.value = current
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]))
}

function getFilteredRows() {
  const from = document.getElementById('f_from').value
  const to = document.getElementById('f_to').value
  const shop = document.getElementById('f_shop').value
  const campaign = document.getElementById('f_campaign').value
  const product = document.getElementById('f_product').value

  return dashRawRows.filter((r) => {
    if (shop && r.shop_name !== shop) return false
    if (campaign && r.ten_dich_vu_hien_thi !== campaign) return false
    if (product && r.ma_san_pham !== product) return false
    if (r.ngay_bat_dau && (r.ngay_bat_dau < from || r.ngay_bat_dau > to)) return false
    return true
  })
}

function renderDashboard() {
  const groupBy = document.getElementById('f_groupBy').value
  const rows = getFilteredRows()

  renderKpiCards(computeKpis(rows))

  const trendData = groupAndCompute(rows, (r) => periodKey(r, groupBy))
  renderTrendCharts(trendData, groupBy)

  const topCampaigns = topN(rows, (r) => r.ten_dich_vu_hien_thi || 'Không rõ', 10, 'cost')
  const topProducts = topN(rows, (r) => r.ma_san_pham || 'Không rõ', 10, 'revenue')
  const statusData = groupAndCompute(rows, (r) => r.trang_thai || 'Không rõ')

  renderCampaignBar(topCampaigns)
  renderStatusPie(statusData)
  renderHeatmap(rows, topCampaigns)
  renderTopTable('topCampaignTable', topCampaigns, 'Campaign')
  renderTopTable('topProductTable', topProducts, 'Mã sản phẩm')

  populateComparisonSelectors()
  renderComparison()
}

function renderKpiCards(kpis) {
  document.getElementById('kpiGrid').innerHTML = KPI_DEFS.map((d) => {
    const value = d.fmt(kpis[d.key])
    const note = d.note ? d.note(kpis[d.key]) : null
    return `<div class="card p-3 bg-white dark:bg-gray-900 border-gray-200 dark:border-gray-800">
      <p class="text-xs text-gray-400">${d.label}</p>
      <p class="mt-1 text-lg font-bold ${d.color || ''}">${value}</p>
      ${note ? `<p class="mt-0.5 text-[10px] text-gray-400">${note}</p>` : ''}
    </div>`
  }).join('')
}

function destroyChart(name) { if (dashCharts[name]) { dashCharts[name].destroy(); delete dashCharts[name] } }

function renderTrendCharts(trendData, groupBy) {
  const labels = trendData.map((d) => periodDisplay(d.label, groupBy))

  destroyChart('revenueCost')
  dashCharts.revenueCost = new Chart(document.getElementById('chartRevenueCost'), {
    type: 'line',
    data: { labels, datasets: [
      { label: 'Doanh thu', data: trendData.map((d) => d.revenue), borderColor: '#EE4D2D', backgroundColor: '#EE4D2D', tension: 0.3 },
      { label: 'Chi phí', data: trendData.map((d) => d.cost), borderColor: '#3B82F6', backgroundColor: '#3B82F6', tension: 0.3 }
    ] },
    options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
  })

  destroyChart('roasAcos')
  dashCharts.roasAcos = new Chart(document.getElementById('chartRoasAcos'), {
    type: 'line',
    data: { labels, datasets: [
      { label: 'ROAS (x)', data: trendData.map((d) => d.roas), borderColor: '#10B981', backgroundColor: '#10B981', tension: 0.3 },
      { label: 'ACOS (%)', data: trendData.map((d) => d.acos), borderColor: '#F59E0B', backgroundColor: '#F59E0B', tension: 0.3 }
    ] },
    options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
  })
}

function renderCampaignBar(topCampaigns) {
  destroyChart('campaignBar')
  const labels = topCampaigns.map((d) => (d.label.length > 18 ? d.label.slice(0, 18) + '…' : d.label))
  dashCharts.campaignBar = new Chart(document.getElementById('chartCampaignBar'), {
    type: 'bar',

const PIE_COLORS = ['#EE4D2D', '#3B82F6', '#10B981', '#F59E0B', '#8B5CF6', '#EC4899', '#6B7280']
function renderStatusPie(statusData) {
  destroyChart('statusPie')
  dashCharts.statusPie = new Chart(document.getElementById('chartStatusPie'), {
    type: 'pie',
    data: { labels: statusData.map((d) => d.label), datasets: [{ data: statusData.map((d) => d.cost), backgroundColor: PIE_COLORS }] },

  })

function renderHeatmap(rows, topCampaigns) {
  const top5 = topCampaigns.slice(0, 5).map((c) => c.label)
  const cells = []
  rows.filter((r) => top5.includes(r.ten_dich_vu_hien_thi)).forEach((r) => {
    const month = `${pad2(r.thang)}/${r.nam}`
    let cell = cells.find((c) => c.campaign === r.ten_dich_vu_hien_thi && c.month === month)
    if (!cell) { cell = { campaign: r.ten_dich_vu_hien_thi, month, cost: 0 }; cells.push(cell) }
    cell.cost += Number(r.chi_phi) || 0
  })

  const container = document.getElementById('heatmapContainer')
  if (cells.length === 0) { container.innerHTML = '<p class="text-sm text-gray-400">Không có dữ liệu</p>'; return }

  const campaigns = [...new Set(cells.map((c) => c.campaign))]
  const months = [...new Set(cells.map((c) => c.month))].sort()
  const max = Math.max(1, ...cells.map((c) => c.cost))
  const getCost = (c, m) => cells.find((x) => x.campaign === c && x.month === m)?.cost || 0
  const colorFor = (v) => `rgba(238, 77, 45, ${(0.08 + (v / max) * 0.85).toFixed(2)})`

  container.innerHTML = `<table class="text-xs">
    <thead><tr><th class="p-1 text-left text-gray-400">Campaign</th>${months.map((m) => `<th class="p-1 text-gray-400">${m}</th>`).join('')}</tr></thead>
    <tbody>${campaigns.map((c) => `<tr>
      <td class="max-w-[160px] truncate p-1 pr-2" title="${escapeHtml(c)}">${escapeHtml(c)}</td>
      ${months.map((m) => { const v = getCost(c, m); return `<td class="p-1 text-center" title="${formatVND(v)}"><div class="rounded px-2 py-1" style="background:${colorFor(v)}">${v > 0 ? Math.round(v / 1000) + 'k' : ''}</div></td>` }).join('')}
    </tr>`).join('')}</tbody></table>`
}

      <td class="py-2 pr-3">${r.roas.toFixed(2)}x</td>

      <td class="py-2 pr-3">${formatPercent(r.ctr)}</td>
      <td class="py-2 pr-3">${formatNumber(r.orders)}</td>
    </tr>`).join('')}</tbody></table>`
}

/* -----------------------------------------------------------------------
   8b. SO SANH HIEU QUA THEO KY (3 ky lien tiep: Thang/Quy/Nam)
   Doi chieu % chenh lech giua cac ky + danh gia theo nguong tham khao
   chung cho ROAS/ACOS/CTR/CVR. Cac nguong nay CHI la tham khao pho bien
   cua nganh e-commerce, thuc te "tot/xau" phu thuoc bien loi nhuan tung
   nganh hang - khong phai chuan tuyet doi.
   ----------------------------------------------------------------------- */
const BENCHMARKS = {
  roas: [
    { max: 3, label: 'Cần cải thiện', color: 'bg-red-100 text-red-700' },
    { max: 8, label: 'Ổn / Khá', color: 'bg-yellow-100 text-yellow-700' },
    { max: Infinity, label: 'Tốt', color: 'bg-green-100 text-green-700' }
  ],
  acos: [
    { max: 15, label: 'Tốt', color: 'bg-green-100 text-green-700' },
    { max: 30, label: 'Ổn / Khá', color: 'bg-yellow-100 text-yellow-700' },
    { max: Infinity, label: 'Cần cải thiện', color: 'bg-red-100 text-red-700' }
  ],
  ctr: [
    { max: 0.5, label: 'Thấp', color: 'bg-red-100 text-red-700' },
    { max: 1.5, label: 'Trung bình', color: 'bg-yellow-100 text-yellow-700' },
    { max: Infinity, label: 'Tốt', color: 'bg-green-100 text-green-700' }
  ],
  cvr: [
    { max: 1, label: 'Thấp', color: 'bg-red-100 text-red-700' },
    { max: 3, label: 'Trung bình', color: 'bg-yellow-100 text-yellow-700' },
    { max: Infinity, label: 'Tốt', color: 'bg-green-100 text-green-700' }
  ]
}
function evalBenchmark(metric, value) {
  const tiers = BENCHMARKS[metric]
  for (const t of tiers) if (value <= t.max) return t
  return tiers[tiers.length - 1]
}

const CMP_METRIC_ROWS = [
  { key: 'revenue', label: 'Doanh thu', fmt: formatVND, dir: 'up-good' },
  { key: 'cost', label: 'Chi phí Ads', fmt: formatVND, dir: 'neutral' },
  { key: 'roas', label: 'ROAS', fmt: (v) => v.toFixed(2) + 'x', dir: 'up-good' },
  { key: 'acos', label: 'ACOS', fmt: formatPercent, dir: 'down-good' },
  { key: 'ctr', label: 'CTR', fmt: formatPercent, dir: 'up-good' },
  { key: 'cpc', label: 'CPC', fmt: formatVND, dir: 'down-good' },
  { key: 'cpm', label: 'CPM', fmt: formatVND, dir: 'down-good' },
  { key: 'cpa', label: 'CPA', fmt: formatVND, dir: 'down-good' },
  { key: 'cvr', label: 'CVR / Conversion Rate', fmt: formatPercent, dir: 'up-good' },
  { key: 'clicks', label: 'Click', fmt: formatNumber, dir: 'up-good' },
  { key: 'impressions', label: 'Impression', fmt: formatNumber, dir: 'neutral' },
  { key: 'orders', label: 'Orders', fmt: formatNumber, dir: 'up-good' }
]

// Loc rieng cho khoi so sanh: theo Shop/Campaign/San pham dang chon, KHONG
// gioi han theo "Tu ngay/Den ngay" (de co du 3 ky de so sanh trong toan bo
// du lieu da tai ve theo khoang ngay rong hon o bo loc chinh).
function getComparisonRows() {
  const shop = document.getElementById('f_shop').value
  const campaign = document.getElementById('f_campaign').value
  const product = document.getElementById('f_product').value
  return dashRawRows.filter((r) => {
    if (shop && r.shop_name !== shop) return false
    if (campaign && r.ten_dich_vu_hien_thi !== campaign) return false
    if (product && r.ma_san_pham !== product) return false
    return true
  })
}

function getAvailableComparisonPeriods(periodType) {
  const rows = getComparisonRows()
  const keys = new Set()
  rows.forEach((r) => { const k = periodKey(r, periodType); if (k !== 'N/A') keys.add(k) })
  return Array.from(keys).sort()
}

function populateComparisonSelectors() {
  const periodType = document.getElementById('cmp_periodType').value
  const periods = getAvailableComparisonPeriods(periodType)
  const last3 = periods.slice(-3)
  ;['cmp_p1', 'cmp_p2', 'cmp_p3'].forEach((id, idx) => {
    const el = document.getElementById(id)
    const prevValue = el.value
    el.innerHTML = periods.map((p) => `<option value="${p}">${periodDisplay(p, periodType)}</option>`).join('')
    if (periods.includes(prevValue)) el.value = prevValue
    else if (last3[idx]) el.value = last3[idx]
  })
}

function pctChange(a, b) {
  if (a === 0) return b === 0 ? 0 : null
  return ((b - a) / a) * 100
}

function changeBadge(pct, direction) {
  if (pct === null || pct === undefined) return '<span class="text-gray-400">—</span>'
  const isUp = pct > 0.5, isDown = pct < -0.5
  let favorable = null
  if (direction === 'up-good') favorable = isUp ? true : (isDown ? false : null)
  if (direction === 'down-good') favorable = isDown ? true : (isUp ? false : null)
  const color = favorable === true ? 'text-green-600' : (favorable === false ? 'text-red-600' : 'text-gray-500')
  const arrow = isUp ? '▲' : (isDown ? '▼' : '→')
  return `<span class="${color} font-medium">${arrow} ${Math.abs(pct).toFixed(1)}%</span>`
}

function renderBenchmarkBadges(latestKpi) {
  const items = [
    { key: 'roas', label: 'ROAS', value: latestKpi.roas, display: latestKpi.roas.toFixed(2) + 'x' },
    { key: 'acos', label: 'ACOS', value: latestKpi.acos, display: formatPercent(latestKpi.acos) },
    { key: 'ctr', label: 'CTR', value: latestKpi.ctr, display: formatPercent(latestKpi.ctr) },
    { key: 'cvr', label: 'CVR', value: latestKpi.cvr, display: formatPercent(latestKpi.cvr) }
  ]
  return `<p class="text-xs font-medium text-gray-400 mb-2">Đánh giá chỉ số ở kỳ mới nhất (ngưỡng tham khảo chung của ngành, thực tế "tốt/xấu" còn phụ thuộc biên lợi nhuận từng ngành hàng):</p>
    <div class="flex flex-wrap gap-2">
      ${items.map((i) => {
        const b = evalBenchmark(i.key, i.value)
        return `<span class="rounded-full px-3 py-1 text-xs font-medium ${b.color}">${i.label} ${i.display} — ${b.label}</span>`
      }).join('')}
    </div>`
}

function buildComparisonSummary(labels, kpi1, kpi3) {
  const roasChange = pctChange(kpi1.roas, kpi3.roas)
  const acosChange = pctChange(kpi1.acos, kpi3.acos)
  const revenueChange = pctChange(kpi1.revenue, kpi3.revenue)
  const costChange = pctChange(kpi1.cost, kpi3.cost)

  const parts = [`So sánh từ <b>${labels[0]}</b> đến <b>${labels[2]}</b>:`]

  if (roasChange !== null) {
    if (roasChange > 5) parts.push(`ROAS tăng ${roasChange.toFixed(1)}% — hiệu quả quảng cáo đang <b class="text-green-600">cải thiện</b>.`)
    else if (roasChange < -5) parts.push(`ROAS giảm ${Math.abs(roasChange).toFixed(1)}% — hiệu quả quảng cáo đang <b class="text-red-600">đi xuống</b>, nên xem lại từ khóa/giá thầu/sản phẩm quảng cáo.`)
    else parts.push(`ROAS khá ổn định (thay đổi ${roasChange.toFixed(1)}%).`)
  }
  if (acosChange !== null && acosChange > 20) {
    parts.push(`ACOS tăng ${acosChange.toFixed(1)}% — chi phí quảng cáo trên mỗi đồng doanh thu đang <b class="text-red-600">tăng cao</b>, cần kiểm tra lại hiệu suất từ khóa/vị trí quảng cáo.`)
  }
  if (revenueChange !== null && costChange !== null) {
    if (costChange > revenueChange + 10) parts.push(`Chi phí tăng (${costChange.toFixed(1)}%) nhanh hơn doanh thu (${revenueChange.toFixed(1)}%) — cần rà soát lại ngân sách quảng cáo.`)
    else if (revenueChange > costChange + 10) parts.push(`Doanh thu tăng (${revenueChange.toFixed(1)}%) nhanh hơn chi phí (${costChange.toFixed(1)}%) — quảng cáo đang được tối ưu tốt hơn theo thời gian.`)
  }
  if (parts.length === 1) parts.push('Chưa đủ dữ liệu để đưa ra nhận xét rõ ràng (một số kỳ có doanh thu/chi phí bằng 0).')

  return parts.join(' ')
}

// Sinh de xuat dieu chinh quang cao theo TUNG chi so, dua tren xu huong
// (Moc 1 -> Moc 3) ket hop nguong tham khao (voi ROAS/ACOS/CTR/CVR).
// Day la goi y RULE-BASED don gian, mang tinh tham khao, khong thay the
// viec nguoi quan ly quang cao tu danh gia theo boi canh thuc te.
function getRecommendation(key, kpi1, kpi3) {
  const v1 = kpi1[key], v3 = kpi3[key]
  const change = pctChange(v1, v3)
  const up = change !== null && change > 5
  const down = change !== null && change < -5

  switch (key) {
    case 'roas': {
      const tier = evalBenchmark('roas', v3).label
      if (tier === 'Cần cải thiện') return 'ROAS đang thấp — nên loại bớt từ khóa/vị trí kém hiệu quả, thu hẹp targeting.'
      if (down) return 'ROAS giảm — rà soát lại chiến dịch, cân nhắc giảm ngân sách phần kém hiệu quả.'
      if (up) return 'ROAS cải thiện — có thể tăng ngân sách để mở rộng quy mô.'
      return 'ROAS ổn định — duy trì chiến lược hiện tại.'
    }
    case 'acos': {
      const tier = evalBenchmark('acos', v3).label
      if (tier === 'Cần cải thiện') return 'ACOS cao — giảm giá thầu hoặc loại bỏ từ khóa chi phí cao nhưng ít chuyển đổi.'
      if (up) return 'ACOS tăng — theo dõi sát, cân nhắc điều chỉnh giá thầu.'
      if (down) return 'ACOS giảm — hiệu quả chi phí đang tốt lên.'
      return 'ACOS ổn định.'
    }
    case 'ctr': {
      const tier = evalBenchmark('ctr', v3).label
      if (tier === 'Thấp') return 'CTR thấp — cải thiện hình ảnh/tiêu đề sản phẩm hoặc đổi vị trí quảng cáo.'
      if (down) return 'CTR giảm — nội dung/hình ảnh quảng cáo có thể đang kém hấp dẫn hơn.'
      if (up) return 'CTR tăng — nội dung đang thu hút, có thể nhân rộng cách làm.'
      return 'CTR ổn định.'
    }
    case 'cpc':
      if (up) return 'CPC tăng — xem lại chiến lược đấu thầu, cân nhắc chuyển sang tối ưu theo ROAS.'
      if (down) return 'CPC giảm — chi phí mỗi click đang tối ưu tốt.'
      return 'CPC ổn định.'
    case 'cpm':
      if (up) return 'CPM tăng — chi phí hiển thị cao hơn, cân nhắc điều chỉnh đối tượng/vị trí quảng cáo.'
      if (down) return 'CPM giảm — chi phí hiển thị đang tối ưu.'
      return 'CPM ổn định.'
    case 'cpa':
      if (up) return 'CPA tăng — tối ưu lại trang sản phẩm hoặc thu hẹp đối tượng target.'
      if (down) return 'CPA giảm — chi phí mỗi chuyển đổi đang tốt lên.'
      return 'CPA ổn định.'
    case 'cvr': {
      const tier = evalBenchmark('cvr', v3).label
      if (tier === 'Thấp') return 'CVR thấp — kiểm tra giá bán, đánh giá sản phẩm, hoặc trải nghiệm trang sản phẩm.'
      if (down) return 'CVR giảm — xem lại giá/khuyến mãi hoặc trải nghiệm mua hàng.'
      if (up) return 'CVR tăng — sản phẩm/giá đang hấp dẫn khách hơn.'
      return 'CVR ổn định.'
    }
    case 'cost':
      if (up) return 'Chi phí tăng — đối chiếu với Doanh thu/ROAS để xem có tương xứng không.'
      if (down) return 'Chi phí giảm — kiểm tra xem có ảnh hưởng độ phủ/doanh thu không.'
      return 'Chi phí ổn định.'
    case 'revenue':
      if (up) return 'Doanh thu tăng — hiệu quả tổng thể tốt, có thể cân nhắc mở rộng ngân sách.'
      if (down) return 'Doanh thu giảm — cần xem lại toàn bộ chiến dịch, sản phẩm quảng cáo.'
      return 'Doanh thu ổn định.'
    case 'clicks':
    case 'impressions':
      if (down) return 'Giảm — có thể do ngân sách hoặc cạnh tranh từ khóa tăng.'
      if (up) return 'Tăng — độ phủ quảng cáo đang mở rộng.'
      return 'Ổn định.'
    case 'orders':
      if (up) return 'Số đơn tăng — hiệu quả bán hàng tốt.'
      if (down) return 'Số đơn giảm — xem lại phễu chuyển đổi (CTR, CVR).'
      return 'Ổn định.'
    default:
      return '—'
  }
}

function renderComparison() {
  const periodType = document.getElementById('cmp_periodType').value
  const rows = getComparisonRows()
  const p1 = document.getElementById('cmp_p1').value
  const p2 = document.getElementById('cmp_p2').value
  const p3 = document.getElementById('cmp_p3').value

  const tableEl = document.getElementById('cmp_table')
  const benchmarkEl = document.getElementById('cmp_benchmark')
  const summaryEl = document.getElementById('cmp_summary')
  const availablePeriods = getAvailableComparisonPeriods(periodType)

  if (availablePeriods.length < 3 || !p1 || !p2 || !p3) {
    tableEl.innerHTML = `<p class="text-sm text-gray-400 py-2">Cần ít nhất 3 kỳ có dữ liệu để so sánh (hiện có ${availablePeriods.length} kỳ trong khoảng ngày đang tải). Hãy mở rộng "Từ ngày/Đến ngày" ở bộ lọc phía trên rồi bấm 🔄 Làm mới.</p>`
    benchmarkEl.innerHTML = ''
    summaryEl.innerHTML = ''
    return
  }

  const kpi1 = computeKpis(rows.filter((r) => periodKey(r, periodType) === p1))
  const kpi2 = computeKpis(rows.filter((r) => periodKey(r, periodType) === p2))
  const kpi3 = computeKpis(rows.filter((r) => periodKey(r, periodType) === p3))
  const labels = [periodDisplay(p1, periodType), periodDisplay(p2, periodType), periodDisplay(p3, periodType)]

  tableEl.innerHTML = `<table class="w-full text-left text-sm">
    <thead><tr class="border-b border-gray-200 dark:border-gray-800">
      <th class="py-2 pr-3 font-medium text-gray-400">Chỉ số</th>
      <th class="py-2 pr-3 font-medium text-gray-400">${labels[0]}</th>
      <th class="py-2 pr-3 font-medium text-gray-400">${labels[1]}</th>
      <th class="py-2 pr-3 font-medium text-gray-400">% so với Mốc 1</th>
      <th class="py-2 pr-3 font-medium text-gray-400">${labels[2]}</th>
      <th class="py-2 pr-3 font-medium text-gray-400">% so với Mốc 2</th>
      <th class="py-2 pr-3 font-medium text-gray-400 min-w-[220px]">Đề xuất điều chỉnh</th>
    </tr></thead>
    <tbody>
      ${CMP_METRIC_ROWS.map((d) => {
        const v1 = kpi1[d.key], v2 = kpi2[d.key], v3 = kpi3[d.key]
        return `<tr class="border-b border-gray-200 dark:border-gray-800 last:border-0">
          <td class="py-2 pr-3">${d.label}</td>
          <td class="py-2 pr-3">${d.fmt(v1)}</td>
          <td class="py-2 pr-3">${d.fmt(v2)}</td>
          <td class="py-2 pr-3">${changeBadge(pctChange(v1, v2), d.dir)}</td>
          <td class="py-2 pr-3">${d.fmt(v3)}</td>
          <td class="py-2 pr-3">${changeBadge(pctChange(v2, v3), d.dir)}</td>
          <td class="py-2 pr-3 text-xs text-gray-600 dark:text-gray-300">${getRecommendation(d.key, kpi1, kpi3)}</td>
        </tr>`
      }).join('')}
    </tbody>
  </table>`

  benchmarkEl.innerHTML = renderBenchmarkBadges(kpi3)
  summaryEl.innerHTML = buildComparisonSummary(labels, kpi1, kpi3)
}

let uploadInitialized = false
let uploadState = { file: null, parseResult: null }

}

function progressBarHTML(percent, label) {
  return `<p class="mb-1 text-xs text-gray-400">${label}</p>
    <div class="h-2.5 w-full overflow-hidden rounded-full bg-gray-200 dark:bg-gray-700">
      <div class="h-full rounded-full bg-brand" style="width:${percent}%"></div>
    </div>
    <p class="mt-1 text-right text-xs text-gray-400">${percent}%</p>`
}

function initUploadPage() {
  uploadInitialized = true
  const container = document.getElementById('page-upload')
  container.innerHTML = uploadSkeletonHTML()

  const dropzone = document.getElementById('up_dropzone')
  const fileInput = document.getElementById('up_fileInput')

  dropzone.addEventListener('click', () => fileInput.click())
  dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('border-brand', 'bg-brand-50') })
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('border-brand', 'bg-brand-50'))
  dropzone.addEventListener('drop', (e) => {
    e.preventDefault()
    dropzone.classList.remove('border-brand', 'bg-brand-50')
    handleFileSelected(e.dataTransfer.files?.[0])
  })
  fileInput.addEventListener('change', (e) => handleFileSelected(e.target.files?.[0]))

  loadUploadHistory()
}

async function handleFileSelected(file) {
  if (!file) return
  if (!/\.(xlsx|xls|csv)$/i.test(file.name)) { alert('Chỉ hỗ trợ file .xlsx, .xls hoặc .csv'); return }

  uploadState.file = file
  showUploadStep('parsing')
  document.getElementById('up_parsing').innerHTML = progressBarHTML(40, `Đang đọc file ${file.name}...`)

  try {
    const shopName = document.getElementById('up_shopName').value || 'Default Shop'
    const result = await parseShopeeAdsFile(file, shopName)
    uploadState.parseResult = result
    renderReview(result)
    showUploadStep('review')
  } catch (err) {
    alert('Lỗi đọc file: ' + err.message)
    showUploadStep('idle')
  }
}

function showUploadStep(step) {
  ;['parsing', 'review', 'syncing', 'done'].forEach((s) => document.getElementById(`up_${s}`).classList.add('hidden-important'))
  if (step !== 'idle') document.getElementById(`up_${step}`).classList.remove('hidden-important')
}

function renderReview(result) {
  const hasIssue = result.missingColumns.length > 0 || result.errors.length > 0
  let html
  if (!hasIssue) {
    html = `<div class="rounded-lg bg-green-50 px-4 py-3 text-sm text-green-700">
      ✅ Định dạng hợp lệ — ${result.totalDataRows} dòng dữ liệu, ${result.rows.length} dòng sẵn sàng để đồng bộ.
    </div>`
  } else {
    html = `<div class="rounded-lg bg-red-50 px-4 py-3 text-sm text-red-700">
      <p class="mb-2 font-semibold">⚠️ Phát hiện lỗi định dạng dữ liệu:</p>
      ${result.missingColumns.length ? `<div class="mb-2"><p class="font-medium">Thiếu cột bắt buộc:</p><ul class="ml-4 list-disc">${result.missingColumns.map((c) => `<li>${escapeHtml(c)}</li>`).join('')}</ul></div>` : ''}
      ${result.errors.length ? `<div><p class="font-medium">Lỗi dữ liệu (${result.errors.length} dòng):</p>
        <ul class="ml-4 max-h-40 list-disc overflow-y-auto">${result.errors.slice(0, 30).map((e) => `<li>Dòng ${e.row}: ${escapeHtml(e.message)}</li>`).join('')}</ul>
        ${result.errors.length > 30 ? `<p class="mt-1 italic">... và ${result.errors.length - 30} lỗi khác</p>` : ''}</div>` : ''}
    </div>`
  }

  html += `<div class="flex gap-3">
    <button id="up_confirmBtn" class="rounded-lg bg-brand px-4 py-2 text-sm font-semibold text-white hover:bg-brand-600 disabled:opacity-40" ${(!result.headerValid || result.rows.length === 0) ? 'disabled' : ''}>
      Đồng bộ ${result.rows.length} dòng lên Supabase
    </button>
    <button id="up_resetBtn" class="rounded-lg border px-4 py-2 text-sm border-gray-300 dark:border-gray-700">Chọn file khác</button>
  </div>`

  document.getElementById('up_review').innerHTML = html
  document.getElementById('up_confirmBtn')?.addEventListener('click', handleConfirmSync)
  document.getElementById('up_resetBtn').addEventListener('click', resetUpload)
}

async function handleConfirmSync() {
  const result = uploadState.parseResult
  if (!result?.rows?.length) return
  showUploadStep('syncing')
  document.getElementById('up_syncing').innerHTML = progressBarHTML(0, 'Đang đồng bộ dữ liệu lên Supabase...')

  try {
    const shopName = document.getElementById('up_shopName').value || 'Default Shop'
    const syncResult = await syncRowsToSupabase(result.rows, {
      fileName: uploadState.file.name,
      shopName,
      userId: currentSession?.user?.id,
      onProgress: (p) => { document.getElementById('up_syncing').innerHTML = progressBarHTML(p, 'Đang đồng bộ dữ liệu lên Supabase...') }
    })
    const isOk = syncResult.status === 'success'
    const boxColor = isOk ? 'bg-green-50 text-green-700' : (syncResult.insertedRows + syncResult.updatedRows > 0 ? 'bg-yellow-50 text-yellow-700' : 'bg-red-50 text-red-700')
    const icon = isOk ? '✅' : '⚠️'
    document.getElementById('up_done').innerHTML = `
      <div class="rounded-lg ${boxColor} px-4 py-3 text-sm">
        ${icon} Thêm mới: <b>${syncResult.insertedRows}</b> dòng · Cập nhật: <b>${syncResult.updatedRows}</b> dòng
        ${syncResult.errorRows > 0 ? ` · <b class="text-red-600">Lỗi/không ghi được: ${syncResult.errorRows} dòng</b>` : ''}
        ${syncResult.errorMessage ? `<div class="mt-2 rounded bg-white/60 dark:bg-black/20 px-2 py-1.5 font-mono text-xs break-all">Chi tiết lỗi Supabase: ${escapeHtml(syncResult.errorMessage)}</div>` : ''}
      </div>
      <button id="up_afterDoneBtn" class="w-fit rounded-lg border px-4 py-2 text-sm border-gray-300 dark:border-gray-700">Upload file khác</button>`
    document.getElementById('up_afterDoneBtn').addEventListener('click', resetUpload)
    showUploadStep('done')
    loadUploadHistory()
  } catch (err) {
    alert('Lỗi đồng bộ Supabase: ' + err.message)
    showUploadStep('review')
  }
}

function resetUpload() {
  uploadState = { file: null, parseResult: null }
  document.getElementById('up_fileInput').value = ''
  showUploadStep('idle')
}

/* -----------------------------------------------------------------------
   9b. TRANG KE HOACH THANG (MEDIA PLAN) - PHIEN BAN EDITABLE + TU TINH LAI
   Khac voi ban dau (chi xem tom tat, read-only), ban nay:
   - Trich xuat DAY DU: gia dinh/benchmark (Z1_GiaDinh_ThamSo), phan bo 31
     ngay (02_PhanBo_31Ngay), phan bo theo khung gio (03_PhanBo_TheoGio).
   - Cho SUA TRUC TIEP moi thong so tren Web (ngan sach, giai doan, benchmark
     CPC/CTR/CR/ATC/AOV...) - cac cot ket qua (Click/GMV/Don hang/ROAS...)
     TU DONG TINH LAI ngay tren trinh duyet bang dung cong thuc cua file goc
     (xem computePlan/computeHourly), giong co che cong thuc trong Excel.
   - TU DONG LUU (debounce ~900ms sau lan sua cuoi) vao cot JSONB
     media_plans.assumptions / daily_plan / hourly_plan.
   File goc van duoc luu nguyen ven trong Supabase Storage de doi chieu/tai ve.
   ----------------------------------------------------------------------- */
let mediaPlanInitialized = false
let mediaPlanState = { file: null, parsed: null }
let mpEdit = null // trang thai dang sua: { plan, assumptions, dailyPlan, hourlyPlan, ... }

const MP_PHASES = ['Sale', 'Pre-heat', 'Sustain', 'Normal']
const MP_PHASE_BADGE = { Sale: 'bg-red-50 dark:bg-red-900/30', 'Pre-heat': 'bg-orange-50 dark:bg-orange-900/30', Sustain: 'bg-blue-50 dark:bg-blue-900/30', Normal: 'bg-gray-50 dark:bg-gray-800' }
const MP_DEFAULT_ASSUMPTIONS = {
  phaseWeights: { Sale: 5, 'Pre-heat': 2.5, Sustain: 1.8, Normal: 1 },
  weekendMultiplier: 1.15,
  phaseMultipliers: {
    Normal: { cpc: 1, ctr: 1, cr: 1, atc: 1 },
    'Pre-heat': { cpc: 1.05, ctr: 1.1, cr: 1, atc: 1.08 },
    Sale: { cpc: 1.2, ctr: 1.35, cr: 1.6, atc: 1.45 },
    Sustain: { cpc: 1.08, ctr: 1.15, cr: 1.2, atc: 1.2 }
  }
}

/* ---- CONG THUC ENGINE (tai hien dung cong thuc goc trong Z1/02/Z2/03) ----
   Da doi chieu khop tung dong voi file MediaPlan_Thang7_2026.xlsx (vd ngay
   01/07: budget Nem=1.233.000d/Chan=822.000d, GMV=30.477.020d, Don=29,
   ROAS=14.83x - tinh dung 100% theo cong thuc duoi day). Sua bat ky dau vao
   (ngan sach, trong so, benchmark...) se tu tinh lai toan bo. */
function computePlan(assumptions, dailyPlan) {
  const products = assumptions.products
  const days = dailyPlan.map((d) => {
    const dow = new Date(d.date + 'T00:00:00').getDay() // 0=CN,6=T7
    const isWeekend = dow === 0 || dow === 6
    const phaseW = assumptions.phaseWeights[d.phase] ?? 1
    const autoWeight = phaseW * (isWeekend ? assumptions.weekendMultiplier : 1)
    // Trong so moi ngay MAC DINH tinh tu Giai doan x He so cuoi tuan, nhung
    // nguoi dung co the GHI DE truc tiep (d.weightOverride) - vd de tang/giam
    // rieng 1 ngay ma khong doi Giai doan, hoac khi sua "% Ngan sach" theo
    // Giai doan (applyPhaseBudgetPctOverride se ghi weightOverride hang loat).
    const isWeightOverridden = d.weightOverride !== null && d.weightOverride !== undefined
    const weight = isWeightOverridden ? d.weightOverride : autoWeight
    return { ...d, isWeekend, weight, autoWeight, isWeightOverridden }
  })
  const totalWeight = days.reduce((s, d) => s + d.weight, 0)
  const unitPerWeight = products.map((p) => (totalWeight > 0 ? p.budgetMonthly / totalWeight : 0))

  // Buoc 0: "ROAS muc tieu theo Giai doan" (tuy chon, assumptions.roasTargetByPhase[phase]).
  // ROAS ty le THUAN voi CR khi CPC/AOV/Ngan sach khong doi (ROAS=Click*CR*AOV/Ngan
  // sach), nen chi can tinh ROAS "goc" cua giai doan do (voi CR chuan x He so
  // Giai doan, chua dieu chinh) roi suy ra 1 he so nhan THEM vao CR
  // (crAdjust = ROAS_muc_tieu / ROAS_goc) de danh dung ROAS mong muon, khong
  // dong tac dong CPC/CTR/AOV.
  const roasTargetByPhase = assumptions.roasTargetByPhase || {}
  const crAdjustByPhase = {}
  const sumUnitPerWeight = unitPerWeight.reduce((s, v) => s + v, 0)
  // Ty le % Ngan sach/ngay chia cho tung san pham: MAC DINH ty le thuan voi
  // Ngan sach thang cua tung san pham (unitPerWeight[idx]/tong), nhung co the
  // GHI DE rieng cho TUNG NGAY qua d.productRatioOverride (mang ty le, tong=1)
  // - vd nguoi dung muon 1 ngay cu the danh 70% cho San pham A thay vi ty le
  // mac dinh theo Ngan sach thang.
  function dayProductRatio(d, idx) {
    if (Array.isArray(d.productRatioOverride) && d.productRatioOverride.length === products.length) return d.productRatioOverride[idx]
    return sumUnitPerWeight > 0 ? unitPerWeight[idx] / sumUnitPerWeight : (1 / products.length)
  }
  MP_PHASES.forEach((phase) => {
    const target = roasTargetByPhase[phase]
    if (target === null || target === undefined || !isFinite(target) || target <= 0) { crAdjustByPhase[phase] = 1; return }
    const mult = assumptions.phaseMultipliers[phase] || { cpc: 1, ctr: 1, cr: 1, atc: 1 }
    let sumBudget = 0, sumGmv = 0
    days.forEach((d) => {
      if (d.phase !== phase) return
      const dayTotalBudget = d.weight * sumUnitPerWeight
      products.forEach((p, idx) => {
        const budget = Math.round((dayTotalBudget * dayProductRatio(d, idx)) / 1000) * 1000
        const cpc = p.cpc * mult.cpc
        const cr = p.cr * mult.cr
        const click = cpc > 0 ? budget / cpc : 0
        sumBudget += budget
        sumGmv += click * cr * p.aov
      })
    })
    const baseRoas = sumBudget > 0 ? sumGmv / sumBudget : 0
    crAdjustByPhase[phase] = baseRoas > 0 ? target / baseRoas : 1
  })

  // Buoc 1: tinh Ngan sach/ngay x san pham, LAM TRON ve hang nghin (dung
  // cong thuc ROUND cua file goc) - lam tron tung ngay nhu the nay ve ban
  // chat se khien TONG CA THANG bi le vai nghin dong so voi Ngan sach da
  // nhap (vd 30.000.000 -> 30.007.000).
  const perDayProduct = days.map((d) => {
    const mult = assumptions.phaseMultipliers[d.phase] || { cpc: 1, ctr: 1, cr: 1, atc: 1 }
    const crAdjust = crAdjustByPhase[d.phase] || 1
    const dayTotalBudget = d.weight * sumUnitPerWeight
    return products.map((p, idx) => ({
      name: p.name,
      budget: Math.round((dayTotalBudget * dayProductRatio(d, idx)) / 1000) * 1000,
      cpc: p.cpc * mult.cpc, ctr: p.ctr * mult.ctr, cr: p.cr * mult.cr * crAdjust, atc: p.atc * mult.atc, aov: p.aov
    }))
  })

  // Buoc 2: HIEU CHINH LAM TRON - cong phan chenh lech (Ngan sach thang da
  // nhap trừ Tong da lam tron) vao NGAY CO TRONG SO LON NHAT cua tung san
  // pham (anh huong ty le % nho nhat), de TONG NGAN SACH luon khop CHINH XAC
  // voi Ngan sach thang da cau hinh - du sua Trong so/% Ngan sach the nao.
  products.forEach((p, prodIdx) => {
    const roundedSum = perDayProduct.reduce((s, dayArr) => s + dayArr[prodIdx].budget, 0)
    const diff = Math.round(p.budgetMonthly || 0) - roundedSum
    if (!diff) return
    let targetIdx = 0, maxWeight = -Infinity
    days.forEach((d, i) => { if (d.weight > maxWeight) { maxWeight = d.weight; targetIdx = i } })
    perDayProduct[targetIdx][prodIdx].budget += diff
  })

  // Buoc 3: tu Ngan sach (da hieu chinh chinh xac) suy nguoc ra
  // Click/Impression/Order/GMV/CPA theo dung phễu CPC->CTR->CR->AOV.
  const rows = days.map((d, i) => {
    const perProduct = perDayProduct[i].map((pp) => {
      const click = pp.cpc > 0 ? pp.budget / pp.cpc : 0
      const impr = pp.ctr > 0 ? click / pp.ctr : 0
      const order = click * pp.cr
      const gmv = order * pp.aov
      const cpa = order > 0 ? pp.budget / order : 0
      return { ...pp, click, impr, order, gmv, cpa }
    })
    const totalBudget = perProduct.reduce((s, x) => s + x.budget, 0)
    const totalClick = perProduct.reduce((s, x) => s + x.click, 0)
    const totalImpr = perProduct.reduce((s, x) => s + x.impr, 0)
    const totalOrder = perProduct.reduce((s, x) => s + x.order, 0)
    const totalGMV = perProduct.reduce((s, x) => s + x.gmv, 0)
    const roas = totalBudget > 0 ? totalGMV / totalBudget : 0
    const blendedCpc = totalClick > 0 ? totalBudget / totalClick : 0
    const blendedCtr = totalImpr > 0 ? totalClick / totalImpr : 0
    const blendedCr = totalClick > 0 ? totalOrder / totalClick : 0
    const blendedAtc = totalClick > 0 ? perProduct.reduce((s, x) => s + x.click * x.atc, 0) / totalClick : 0
    return { ...d, perProduct, totalBudget, totalClick, totalImpr, totalOrder, totalGMV, roas, blendedCpc, blendedCtr, blendedCr, blendedAtc }
  })

  const monthTotal = {
    budget: rows.reduce((s, r) => s + r.totalBudget, 0),
    gmv: rows.reduce((s, r) => s + r.totalGMV, 0),
    order: rows.reduce((s, r) => s + r.totalOrder, 0),
    click: rows.reduce((s, r) => s + r.totalClick, 0),
    impr: rows.reduce((s, r) => s + r.totalImpr, 0)
  }
  monthTotal.roas = monthTotal.budget > 0 ? monthTotal.gmv / monthTotal.budget : 0
  monthTotal.cpc = monthTotal.click > 0 ? monthTotal.budget / monthTotal.click : 0
  monthTotal.ctr = monthTotal.impr > 0 ? monthTotal.click / monthTotal.impr : 0
  monthTotal.cr = monthTotal.click > 0 ? monthTotal.order / monthTotal.click : 0
  monthTotal.cpa = monthTotal.order > 0 ? monthTotal.budget / monthTotal.order : 0

  const perProductTotal = products.map((p, idx) => {
    const budget = rows.reduce((s, r) => s + r.perProduct[idx].budget, 0)
    const gmv = rows.reduce((s, r) => s + r.perProduct[idx].gmv, 0)
    const order = rows.reduce((s, r) => s + r.perProduct[idx].order, 0)
    const click = rows.reduce((s, r) => s + r.perProduct[idx].click, 0)
    const impr = rows.reduce((s, r) => s + r.perProduct[idx].impr, 0)
    return { name: p.name, budget, gmv, order, click, impr, roas: budget > 0 ? gmv / budget : 0, cpa: order > 0 ? budget / order : 0 }
  })

  const phaseGroupsMap = {}
  rows.forEach((r) => {
    if (!phaseGroupsMap[r.phase]) phaseGroupsMap[r.phase] = { phase: r.phase, days: 0, budget: 0, gmv: 0, order: 0, click: 0, impr: 0 }
    const g = phaseGroupsMap[r.phase]
    g.days++; g.budget += r.totalBudget; g.gmv += r.totalGMV; g.order += r.totalOrder; g.click += r.totalClick; g.impr += r.totalImpr
  })
  const phaseSummary = Object.values(phaseGroupsMap)
    .map((g) => ({ ...g, budgetPct: monthTotal.budget > 0 ? (g.budget / monthTotal.budget) * 100 : 0, roas: g.budget > 0 ? g.gmv / g.budget : 0 }))
    .sort((a, b) => MP_PHASES.indexOf(a.phase) - MP_PHASES.indexOf(b.phase))

  return { rows, totalWeight, monthTotal, perProductTotal, phaseSummary }
}

function computeHourly(assumptions, planResult, hourlyPlan) {
  const products = assumptions.products
  const totalMonthlyBudget = products.reduce((s, p) => s + p.budgetMonthly, 0)
  const ratios = products.map((p) => (totalMonthlyBudget > 0 ? p.budgetMonthly / totalMonthlyBudget : 1 / products.length))
  const normalDays = planResult.rows.filter((r) => r.phase === 'Normal')
  const autoNormalRepBudget = normalDays.length ? normalDays.reduce((s, r) => s + r.totalBudget, 0) / normalDays.length : 0
  // Ngan sach dai dien Ngay thuong: mac dinh TU DONG = TB cac ngay Normal
  // (giong AVERAGEIF trong file goc), nhung nguoi dung co the GHI DE bang tay
  // (hourlyPlan.normalRepBudget != null) - bam nut "Tu dong" se xoa ghi de.
  const isNormalOverridden = hourlyPlan.normalRepBudget !== null && hourlyPlan.normalRepBudget !== undefined
  const normalRepBudget = isNormalOverridden ? hourlyPlan.normalRepBudget : autoNormalRepBudget

  function process(slots, repBudget) {
    const cum = products.map(() => 0)
    let pctTotal = 0
    const outSlots = (slots || []).map((s) => {
      const budget = (s.pct || 0) * repBudget
      pctTotal += (s.pct || 0)
      const perProduct = products.map((p, idx) => {
        cum[idx] += ratios[idx] * budget
        return { name: p.name, slotBudget: ratios[idx] * budget, cumBudget: cum[idx] }
      })
      return { ...s, budget, perProduct }
    })
    return { slots: outSlots, repBudget, pctTotal, totalBudget: outSlots.reduce((s, x) => s + x.budget, 0) }
  }

  return {
    bigSale: process(hourlyPlan.bigSale, hourlyPlan.bigSaleRepBudget || 0),
    normal: process(hourlyPlan.normal, normalRepBudget),
    autoNormalRepBudget,
    isNormalOverridden
  }
}

/** Sua "% Ngan sach" cua 1 Giai doan (o bang tong hop) -> tinh nguoc ra
 * Trong so can co cua giai doan do de dat dung % muc tieu, roi CHIA LAI theo
 * dung TY LE hien tai giua cac ngay trong giai doan (giu nguyen chenh lech
 * tuong doi giua cac ngay, vd ngay Sale luon > ngay thuong trong cung giai
 * doan neu dang co override rieng), giu nguyen Trong so cac giai doan khac.
 * Ket qua: ghi weightOverride cho TUNG ngay thuoc giai doan nay. */
function applyPhaseBudgetPctOverride(mpEditRef, phase, targetPct) {
  const planResult = computePlan(mpEditRef.assumptions, mpEditRef.dailyPlan)
  const daysInPhase = planResult.rows.filter((r) => r.phase === phase)
  if (!daysInPhase.length) {
    alert(`Giai đoạn "${phase}" hiện chưa có ngày nào — hãy đổi Giai đoạn cho ít nhất 1 ngày sang "${phase}" trước khi sửa % Ngân sách.`)
    return
  }
  const weightPhaseOld = daysInPhase.reduce((s, r) => s + r.weight, 0)
  const otherWeight = planResult.totalWeight - weightPhaseOld
  const clampedPct = Math.min(Math.max(targetPct, 0.001), 0.95)
  if (otherWeight <= 0) {
    alert('Không thể đổi % vì giai đoạn này đang chiếm 100% ngân sách (không còn giai đoạn nào khác để cân đối).')
    return
  }
  const weightPhaseNew = (clampedPct * otherWeight) / (1 - clampedPct)
  const scale = weightPhaseOld > 0 ? weightPhaseNew / weightPhaseOld : 1

  mpEditRef.dailyPlan.forEach((d, idx) => {
    if (d.phase !== phase) return
    const currentWeight = planResult.rows[idx].weight
    d.weightOverride = Number((currentWeight * scale).toFixed(4))
  })
}

/** Sua truc tiep "Tong NS" cua 1 ngay cu the -> tinh NGUOC ra Trong so can
 * co de dat dung so tien do (2 chieu voi "day-weight": sua o nao thi o kia
 * tu dong theo). Vi TongNS_ngay(w) = w * TongNganSachThang / TongTrongSo,
 * va sua w cua 1 ngay se lam doi TongTrongSo, cong thuc duoc giai NGUOC
 * CHINH XAC (khong xap xi) tu quan he:
 *   desired = w' * BUDGET / (TongTrongSoCu - w_cu + w') */
function applyDayBudgetOverride(mpEditRef, dayIdx, desiredBudget) {
  const totalMonthlyBudget = mpEditRef.assumptions.products.reduce((s, p) => s + (p.budgetMonthly || 0), 0)
  if (totalMonthlyBudget <= 0) return
  const planResult = computePlan(mpEditRef.assumptions, mpEditRef.dailyPlan)
  const row = planResult.rows[dayIdx]
  if (!row) return
  const wOld = row.weight
  const totalWeightOld = planResult.totalWeight
  const denom = totalMonthlyBudget - desiredBudget
  if (denom <= 0) {
    alert('Ngân sách của 1 ngày phải nhỏ hơn Tổng ngân sách tháng.')
    return
  }
  let wNew = (desiredBudget * (totalWeightOld - wOld)) / denom
  if (!isFinite(wNew) || wNew < 0) wNew = 0
  mpEditRef.dailyPlan[dayIdx].weightOverride = Number(wNew.toFixed(4))
}

/** Ty le mac dinh (khong override) chia Ngan sach/ngay cho tung san pham:
 * ty le thuan voi Ngan sach THANG da cau hinh cua tung san pham. */
function defaultDayProductRatios(assumptions) {
  const products = assumptions.products
  const sumBudget = products.reduce((s, p) => s + (p.budgetMonthly || 0), 0)
  return products.map((p) => (sumBudget > 0 ? (p.budgetMonthly || 0) / sumBudget : 1 / products.length))
}

/** Sua Ty le % Ngan sach/ngay cho 1 san pham cu the vao 1 ngay cu the ->
 * chia lai phan con lai (1-ty le vua sua) cho cac san pham khac theo dung
 * TY LE TUONG DOI hien tai giua chung (giong co che "% Ngan sach theo Giai
 * doan"), luu vao dailyPlan[dayIdx].productRatioOverride (mang ty le, tong=1,
 * chi ap dung rieng cho ngay do - khong anh huong cac ngay khac). */
function applyDayProductRatioOverride(mpEditRef, dayIdx, prodIdx, newRatio) {
  const day = mpEditRef.dailyPlan[dayIdx]
  if (!day) return
  const products = mpEditRef.assumptions.products
  const n = products.length
  if (n < 2) return
  const current = (Array.isArray(day.productRatioOverride) && day.productRatioOverride.length === n)
    ? day.productRatioOverride.slice()
    : defaultDayProductRatios(mpEditRef.assumptions)
  const clamped = Math.min(Math.max(newRatio, 0), 1)
  const remaining = 1 - clamped
  const othersSum = current.reduce((s, v, i) => (i === prodIdx ? s : s + v), 0)
  const next = current.map((v, i) => {
    if (i === prodIdx) return clamped
    return othersSum > 0 ? (v / othersSum) * remaining : remaining / (n - 1)
  })
  day.productRatioOverride = next
}

/** Giong applyDayProductRatioOverride nhung AP DUNG DONG LOAT cho TAT CA cac
 * ngay trong thang cung luc (vd doi nhanh ty le mac dinh 60/40 thanh 70/30
 * cho ca thang, thay vi phai sua tung ngay mot). Diem xuat phat de chia lai
 * phan con lai la Ty le MAC DINH (theo Ngan sach thang), khong phai ty le
 * dang override rieng cua tung ngay - dung nhu "dat lai tu dau roi ap dung
 * ty le moi cho ca thang". Sau khi ap dung, tung ngay van sua rieng lai
 * duoc binh thuong (data-mp="day-product-ratio" trong tung dong). */
function applyGlobalProductRatioOverride(mpEditRef, prodIdx, newRatio) {
  const products = mpEditRef.assumptions.products
  const n = products.length
  if (n < 2) return
  const defaults = defaultDayProductRatios(mpEditRef.assumptions)
  const clamped = Math.min(Math.max(newRatio, 0), 1)
  const remaining = 1 - clamped
  const othersSum = defaults.reduce((s, v, i) => (i === prodIdx ? s : s + v), 0)
  const next = defaults.map((v, i) => {
    if (i === prodIdx) return clamped
    return othersSum > 0 ? (v / othersSum) * remaining : remaining / (n - 1)
  })
  mpEditRef.dailyPlan.forEach((d) => { d.productRatioOverride = next.slice() })
}

function buildPlanSummaryFields(assumptions, dailyPlan) {
  const plan = computePlan(assumptions, dailyPlan)
  const totalClick = plan.monthTotal.click
  const blendedAtc = totalClick > 0 ? plan.rows.reduce((s, r) => s + r.blendedAtc * r.totalClick, 0) / totalClick : 0
  return {
    total_budget: plan.monthTotal.budget,
    roas_target: plan.monthTotal.roas,
    cpa_target: plan.monthTotal.cpa,
    cpc_target: plan.monthTotal.cpc,
    ctr_target: plan.monthTotal.ctr * 100,
    cvr_target: plan.monthTotal.cr * 100,
    atc_rate_target: blendedAtc * 100,
    gmv_target: plan.monthTotal.gmv,
    orders_target: plan.monthTotal.order,
    aov_assumption: plan.monthTotal.order > 0 ? plan.monthTotal.gmv / plan.monthTotal.order : 0,
    product_breakdown: plan.perProductTotal
  }
}

/** Doc bang "Chi so / Toan Shop" (Section A, sheet 01_Dashboard) - chi lay
 * ten 2 san pham + ngan sach thang tung san pham, phan con lai (CPC/CTR/CR/
 * ATC/AOV/GMV/ROAS...) se duoc TINH LAI tu Z1_GiaDinh_ThamSo + 02_PhanBo_31Ngay
 * (khong doc truc tiep tu 01_Dashboard nua vi do la SO DA TINH SAN, khong
 * phai dau vao). */
function parseDashboardBasics(wb) {
  const dashSheet = wb.Sheets['01_Dashboard']
  if (!dashSheet) throw new Error('Không tìm thấy sheet "01_Dashboard" trong file. Đảm bảo dùng đúng file mẫu Media Plan.')
  const dashRows = XLSX.utils.sheet_to_json(dashSheet, { header: 1, raw: true, defval: null })
  const norm = (v) => nfc(String(v ?? '').trim())

  const headerIdx = dashRows.findIndex((r) => norm(r?.[0]) === 'Chỉ số')
  if (headerIdx === -1) throw new Error('Không tìm thấy bảng "Chỉ số / Toàn Shop" trong sheet 01_Dashboard.')
  const productNames = [norm(dashRows[headerIdx][2]) || 'Sản phẩm 1', norm(dashRows[headerIdx][3]) || 'Sản phẩm 2']

  const budgets = [0, 0]
  for (let i = headerIdx + 1; i < dashRows.length; i++) {
    const label = norm(dashRows[i]?.[0]).toLowerCase()
    if (!label) break
    if (label.includes('ngân sách') && (label.includes('tổng') || label.includes('ads'))) {
      budgets[0] = toFloatOrZero(dashRows[i][2])
      budgets[1] = toFloatOrZero(dashRows[i][3])
      break
    }
  }
  return { productNames, budgets }
}

/** Doc "cong thuc dau vao" tu sheet Z1_GiaDinh_ThamSo: trong so ngan sach
 * theo giai doan, he so cuoi tuan, benchmark CPC/CTR/CR/ATC/AOV goc (Base -
 * Normal) tung san pham, he so nhan theo giai doan. Neu file khong co sheet
 * nay (vd file cu hon) -> dung MP_DEFAULT_ASSUMPTIONS lam du phong. */
function parseZ1Assumptions(wb, productNames) {
  const sheet = wb.Sheets['Z1_GiaDinh_ThamSo']
  const products = productNames.map((name) => ({ name, budgetMonthly: 0, cpc: 0, ctr: 0, cr: 0, atc: 0, aov: 0 }))
  if (!sheet) return { ...JSON.parse(JSON.stringify(MP_DEFAULT_ASSUMPTIONS)), products }

  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true, defval: null })
  const norm = (v) => nfc(String(v ?? '').trim())
  const lower = (v) => norm(v).toLowerCase()

  // 1) Trong so theo Giai doan + He so Cuoi tuan
  const phaseWeights = {}
  let weekendMultiplier = MP_DEFAULT_ASSUMPTIONS.weekendMultiplier
  const wHeaderIdx = rows.findIndex((r) => norm(r?.[1]) === 'Giai đoạn' && lower(r?.[2]).includes('trọng số'))
  if (wHeaderIdx !== -1) {
    for (let i = wHeaderIdx + 1; i < rows.length; i++) {
      const name = norm(rows[i]?.[1])
      if (!name) break
      if (lower(name).includes('cuối tuần')) { weekendMultiplier = toFloatOrZero(rows[i][2]); continue }
      if (!MP_PHASES.includes(name)) break
      phaseWeights[name] = toFloatOrZero(rows[i][2])
    }
  }
  MP_PHASES.forEach((p) => { if (phaseWeights[p] === undefined) phaseWeights[p] = MP_DEFAULT_ASSUMPTIONS.phaseWeights[p] })

  // 2) Benchmark goc "(Base - Normal)" tung san pham - lay THEO THU TU xuat
  // hien (khop voi thu tu san pham o 01_Dashboard), tranh phu thuoc ten
  // san pham viet chinh xac giong het giua cac sheet.
  let pIdx = 0
  rows.forEach((r) => {
    const phaseLabel = lower(r?.[2])
    if (!phaseLabel.includes('base') || !phaseLabel.includes('normal')) return
    if (pIdx >= products.length) return
    const target = products[pIdx]
    target.cpc = toFloatOrZero(r[3]); target.ctr = toFloatOrZero(r[4]); target.cr = toFloatOrZero(r[5])
    target.atc = toFloatOrZero(r[6]); target.aov = toFloatOrZero(r[7])
    pIdx++
  })

  // 3) He so nhan theo Giai doan (ap len benchmark goc)
  const phaseMultipliers = {}
  const mHeaderIdx = rows.findIndex((r) => norm(r?.[2]) === 'Giai đoạn' && lower(r?.[3]).includes('hệ số cpc'))
  if (mHeaderIdx !== -1) {
    for (let i = mHeaderIdx + 1; i < rows.length; i++) {
      const name = norm(rows[i]?.[2])
      if (!MP_PHASES.includes(name)) break
      phaseMultipliers[name] = { cpc: toFloatOrZero(rows[i][3]), ctr: toFloatOrZero(rows[i][4]), cr: toFloatOrZero(rows[i][5]), atc: toFloatOrZero(rows[i][6]) }
    }
  }
  MP_PHASES.forEach((p) => { if (!phaseMultipliers[p]) phaseMultipliers[p] = MP_DEFAULT_ASSUMPTIONS.phaseMultipliers[p] })

  return { phaseWeights, weekendMultiplier, phaseMultipliers, products }
}

/** Doc bang Phan bo 31 ngay (sheet 02_PhanBo_31Ngay): CHI lay phan nguoi dung
 * duoc sua (Ngay/Giai doan/Ghi chu) - cac cot con lai la ket qua tinh toan,
 * se duoc tinh lai boi computePlan() thay vi doc san tu file. */
function parseDailyPlan(wb) {
  const sheet = wb.Sheets['02_PhanBo_31Ngay']
  if (!sheet) return []
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true, defval: null })
  const norm = (v) => nfc(String(v ?? '').trim())
  const headerIdx = rows.findIndex((r) => norm(r?.[0]) === 'Ngày' && norm(r?.[2]) === 'Giai đoạn')
  if (headerIdx === -1) return []

  const days = []
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const r = rows[i]
    const dateVal = r?.[0]
    if (!dateVal) break
    const d = dateVal instanceof Date ? dateVal : new Date(dateVal)
    if (isNaN(d)) break
    const phase = norm(r?.[2])
    const note = r?.[15] != null ? nfc(String(r[15]).trim()) : ''
    days.push({ date: toISODate(d), phase: MP_PHASES.includes(phase) ? phase : 'Normal', note })
  }
  return days
}

/** Doc bang Phan bo theo Khung gio (sheet 03_PhanBo_TheoGio): ngan sach dai
 * dien 1 ngay Big Sale + 2 khoi khung gio (Big Sale / Ngay thuong). */
function parseHourlyPlan(wb) {
  const fallback = { bigSaleRepBudget: 0, bigSale: [], normal: [] }
  const sheet = wb.Sheets['03_PhanBo_TheoGio']
  if (!sheet) return fallback
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true, defval: null })
  const norm = (v) => nfc(String(v ?? '').trim())
  const lower = (v) => norm(v).toLowerCase()

  let bigSaleRepBudget = 0
  const repIdx = rows.findIndex((r) => lower(r?.[0]).includes('ngân sách đại diện') && lower(r?.[0]).includes('big sale'))
  if (repIdx !== -1) bigSaleRepBudget = toFloatOrZero(rows[repIdx][1])

  function readSlotBlock(fromIdx) {
    const headerIdx = rows.findIndex((r, i) => i >= fromIdx && norm(r?.[0]) === 'Khung giờ')
    if (headerIdx === -1) return { slots: [], nextIdx: rows.length }
    const slots = []
    let i = headerIdx + 1
    for (; i < rows.length; i++) {
      const label = norm(rows[i]?.[0])
      if (!label || label.toUpperCase() === 'TỔNG') { i++; break }
      slots.push({
        label,
        pct: toFloatOrZero(rows[i][1]),
        channel: rows[i][3] != null ? nfc(String(rows[i][3]).trim()) : '',
        bid: rows[i][6] != null ? nfc(String(rows[i][6]).trim()) : '',
        action: rows[i][7] != null ? nfc(String(rows[i][7]).trim()) : '',
        reason: rows[i][8] != null ? nfc(String(rows[i][8]).trim()) : ''
      })
    }
    return { slots, nextIdx: i }
  }

  const blockA = readSlotBlock(0)
  const blockB = readSlotBlock(blockA.nextIdx)
  return { bigSaleRepBudget, bigSale: blockA.slots, normal: blockB.slots }
}

/** Doc file Media Plan: lay Thang/Nam tu TEN FILE, cong thuc dau vao tu
 * Z1_GiaDinh_ThamSo, du lieu 31 ngay tu 02_PhanBo_31Ngay, khung gio tu
 * 03_PhanBo_TheoGio. Ket qua tra ve la du lieu SAN SANG DE SUA truc tiep -
 * moi cot ket qua (GMV/Don hang/ROAS...) duoc tinh boi computePlan(), khong
 * doc san tu file. */
async function parseMediaPlanFile(file) {
  const m = file.name.match(/Thang[_\s]?(\d{1,2})[_\s]?(\d{4})/i)
  if (!m) throw new Error('Không nhận diện được Tháng/Năm từ tên file. Đặt tên file dạng "MediaPlan_ThangX_20XX.xlsx" (vd MediaPlan_Thang7_2026.xlsx).')
  const thang = parseInt(m[1], 10)
  const nam = parseInt(m[2], 10)
  const periodStart = `${nam}-${pad2(thang)}-01`
  const lastDay = new Date(nam, thang, 0).getDate()
  const periodEnd = `${nam}-${pad2(thang)}-${pad2(lastDay)}`

  const buffer = await file.arrayBuffer()
  const wb = XLSX.read(buffer, { type: 'array', cellDates: true })

  const { productNames, budgets } = parseDashboardBasics(wb)
  const z1 = parseZ1Assumptions(wb, productNames)
  z1.products.forEach((p, idx) => { p.budgetMonthly = budgets[idx] || 0 })

  const dailyPlan = parseDailyPlan(wb)
  if (!dailyPlan.length) throw new Error('Không đọc được bảng phân bổ 31 ngày (sheet "02_PhanBo_31Ngay"). Đảm bảo dùng đúng file mẫu Media Plan.')
  const hourlyPlan = parseHourlyPlan(wb)

  let planTitle = `Media Plan Tháng ${thang}/${nam}`
  const coverSheet = wb.Sheets['00_BiaTongQuan']
  if (coverSheet) {
    const coverRows = XLSX.utils.sheet_to_json(coverSheet, { header: 1, raw: true, defval: null })
    if (coverRows?.[0]?.[0]) planTitle = nfc(String(coverRows[0][0]).trim())
  }

  const assumptions = { phaseWeights: z1.phaseWeights, weekendMultiplier: z1.weekendMultiplier, phaseMultipliers: z1.phaseMultipliers, products: z1.products }
  return { thang, nam, periodStart, periodEnd, planTitle, assumptions, dailyPlan, hourlyPlan }
}

async function handleMediaPlanFileSelected(file) {
  if (!file) return
  if (!/\.(xlsx|xls)$/i.test(file.name)) { alert('Chỉ hỗ trợ file .xlsx hoặc .xls'); return }
  mediaPlanState.file = file
  showMediaPlanStep('parsing')
  document.getElementById('mp_parsing').innerHTML = progressBarHTML(40, `Đang đọc file ${file.name}...`)

  try {
    const parsed = await parseMediaPlanFile(file)
    mediaPlanState.parsed = parsed
    renderMediaPlanReview(parsed)
    showMediaPlanStep('review')
  } catch (err) {
    alert('Lỗi đọc file: ' + err.message)
    showMediaPlanStep('idle')
  }
}

function showMediaPlanStep(step) {
  ;['parsing', 'review', 'syncing', 'done'].forEach((s) => document.getElementById(`mp_${s}`).classList.add('hidden-important'))
  if (step !== 'idle') document.getElementById(`mp_${step}`).classList.remove('hidden-important')
}

function renderMediaPlanReview(p) {
  const plan = computePlan(p.assumptions, p.dailyPlan)
  const html = `

      ✅ Đã đọc: <b>${escapeHtml(p.planTitle)}</b><br>
      Tháng/Năm: <b>${p.thang}/${p.nam}</b> (${p.periodStart} → ${p.periodEnd}) ·
      Tổng ngân sách: <b>${formatVND(plan.monthTotal.budget)}</b> ·
      ROAS kỳ vọng: <b>${plan.monthTotal.roas.toFixed(2)}x</b> ·

    </div>
    <p class="text-xs text-gray-400">Sau khi lưu, vào "Xem chi tiết" để chỉnh sửa trực tiếp mọi thông số (ngân sách, giai đoạn từng ngày, benchmark CPC/CTR/CR/ATC/AOV...) — các cột GMV/Đơn hàng/ROAS sẽ tự động tính lại và tự động lưu, không cần thao tác gì thêm.</p>
    <div class="flex gap-3">
      <button id="mp_confirmBtn" class="rounded-lg bg-brand px-4 py-2 text-sm font-semibold text-white hover:bg-brand-600">Lưu Kế hoạch lên Supabase</button>
      <button id="mp_resetBtn" class="rounded-lg border px-4 py-2 text-sm border-gray-300 dark:border-gray-700">Chọn file khác</button>
    </div>`
  document.getElementById('mp_review').innerHTML = html
  document.getElementById('mp_confirmBtn').addEventListener('click', handleMediaPlanConfirmSync)
  document.getElementById('mp_resetBtn').addEventListener('click', resetMediaPlanUpload)
}

function resetMediaPlanUpload() {
  mediaPlanState = { file: null, parsed: null }
  document.getElementById('mp_fileInput').value = ''
  showMediaPlanStep('idle')
}

async function handleMediaPlanConfirmSync() {
  const parsed = mediaPlanState.parsed
  const file = mediaPlanState.file
  if (!parsed || !file) return
  showMediaPlanStep('syncing')
  document.getElementById('mp_syncing').innerHTML = progressBarHTML(30, 'Đang tải file gốc lên Supabase Storage...')

  try {
    const shopName = document.getElementById('mp_shopName').value || 'Default Shop'
    const storagePath = `${shopName}/${parsed.nam}-${pad2(parsed.thang)}.xlsx`

    const { error: uploadError } = await sb.storage.from('media-plans')
      .upload(storagePath, file, { upsert: true, contentType: file.type || 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' })
    if (uploadError) throw uploadError

    document.getElementById('mp_syncing').innerHTML = progressBarHTML(70, 'Đang lưu dữ liệu Kế hoạch...')

    const summary = buildPlanSummaryFields(parsed.assumptions, parsed.dailyPlan)
    const { error: planError } = await sb.from('media_plans').upsert({
      shop_name: shopName,
      thang: parsed.thang,
      nam: parsed.nam,
      plan_title: parsed.planTitle,
      period_start: parsed.periodStart,
      period_end: parsed.periodEnd,
      ...summary,
      assumptions: parsed.assumptions,
      daily_plan: parsed.dailyPlan,
      hourly_plan: parsed.hourlyPlan,
      file_path: storagePath,
      file_name: file.name,
      uploaded_by: currentSession?.user?.id
    }, { onConflict: 'plan_key' }).select().single()
    if (planError) throw planError

    document.getElementById('mp_done').innerHTML = `
      <div class="rounded-lg bg-green-50 px-4 py-3 text-sm text-green-700">✅ Đã lưu Kế hoạch tháng ${parsed.thang}/${parsed.nam} cho Shop "${escapeHtml(shopName)}". Vào "Xem chi tiết" bên dưới để chỉnh sửa trực tiếp.</div>
      <button id="mp_afterDoneBtn" class="w-fit rounded-lg border px-4 py-2 text-sm border-gray-300 dark:border-gray-700">Upload kế hoạch khác</button>`
    document.getElementById('mp_afterDoneBtn').addEventListener('click', resetMediaPlanUpload)
    showMediaPlanStep('done')
    loadMediaPlanList()
  } catch (err) {
    alert('Lỗi lưu Kế hoạch: ' + err.message)
    showMediaPlanStep('review')
  }
}

async function loadMediaPlanList() {
  const container = document.getElementById('mp_list')
  container.innerHTML = '<p class="text-sm text-gray-400">Đang tải...</p>'
  try {
    const { data, error } = await sb.from('media_plans').select('*').order('nam', { ascending: false }).order('thang', { ascending: false })
    if (error) throw error
    renderMediaPlanList(data || [])
  } catch (err) {
    container.innerHTML = `<p class="text-sm text-red-500">Lỗi tải danh sách: ${escapeHtml(err.message)}</p>`
  }
}

    </tr>`).join('')}</tbody></table>`

  container.querySelectorAll('.mp-view-btn').forEach((btn) => btn.addEventListener('click', () => showMediaPlanDetail(btn.dataset.planId)))

async function showMediaPlanDetail(planId) {
  const detailEl = document.getElementById('mp_detail')
  detailEl.classList.remove('hidden-important')
  detailEl.innerHTML = '<div class="card p-4 bg-white dark:bg-gray-900 border-gray-200 dark:border-gray-800"><p class="text-sm text-gray-400">Đang tải chi tiết Kế hoạch...</p></div>'
  detailEl.scrollIntoView({ behavior: 'smooth', block: 'start' })

  try {
    const { data: plan, error: planErr } = await sb.from('media_plans').select('*').eq('id', planId).single()
    if (planErr) throw planErr

    // Doi chieu Ke hoach vs Thuc te: lay du lieu that cung Shop/Thang/Nam
    const { data: actualRows, error: actualErr } = await sb.from('v_ads_computed').select('*')
      .eq('shop_name', plan.shop_name).eq('thang', plan.thang).eq('nam', plan.nam).limit(20000)
    const actualKpi = actualErr ? null : computeKpis(actualRows || [])

    let fileUrl = null
    if (plan.file_path) {
      const { data: signedData } = await sb.storage.from('media-plans').createSignedUrl(plan.file_path, 3600)
      fileUrl = signedData?.signedUrl || null
    }

    // Ke hoach luu tu ban CU (truoc khi co tinh nang Editable) chua co
    // assumptions/daily_plan -> khong the tinh lai/sua truc tiep duoc.
    if (!plan.assumptions || !plan.daily_plan) {
      detailEl.innerHTML = `<div class="card p-4 bg-white dark:bg-gray-900 border-gray-200 dark:border-gray-800">
        <p class="text-sm text-amber-600">⚠️ Kế hoạch này được lưu từ phiên bản cũ (chưa có dữ liệu chi tiết theo ngày/giờ). Hãy Upload lại đúng file Media Plan gốc ở mục phía trên (cùng tên file, cùng Shop) để nâng cấp lên bản xem/sửa chi tiết.</p>
        ${fileUrl ? `<a href="${fileUrl}" target="_blank" class="mt-3 inline-block rounded-lg bg-brand px-3 py-1.5 text-xs font-medium text-white hover:bg-brand-600">⬇️ Tải file gốc</a>` : ''}
      </div>`
      return
    }

    mpEdit = {
      plan, fileUrl, actualKpi,
      assumptions: JSON.parse(JSON.stringify(plan.assumptions)),
      dailyPlan: JSON.parse(JSON.stringify(plan.daily_plan)),
      hourlyPlan: JSON.parse(JSON.stringify(plan.hourly_plan || { bigSaleRepBudget: 0, bigSale: [], normal: [] })),
      saveTimer: null,
      saveStatus: 'idle', // idle | dirty | saving | saved | error
      lastSavedAt: null,
      saveError: null
    }
    renderMediaPlanDetail()
  } catch (err) {
    detailEl.innerHTML = `<div class="card p-4 bg-white dark:bg-gray-900 border-gray-200 dark:border-gray-800"><p class="text-sm text-red-500">Lỗi tải chi tiết: ${escapeHtml(err.message)}</p></div>`
  }
}
