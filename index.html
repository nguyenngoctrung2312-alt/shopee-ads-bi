/* ---- Xu ly khi nguoi dung sua bat ky o input/select/textarea nao (event
   delegation, gan 1 lan duy nhat tren #mp_detail luc initMediaPlanPage) ---- */
function handleMpFieldChange(e) {
  const el = e.target.closest('[data-mp]')
  if (!el || !mpEdit) return
  const kind = el.dataset.mp
  const val = el.value

  if (kind === 'product-name') {
    mpEdit.assumptions.products[+el.dataset.idx].name = val || `Sản phẩm ${+el.dataset.idx + 1}`
  } else if (kind === 'product-budget') {
    mpEdit.assumptions.products[+el.dataset.idx].budgetMonthly = toFloatOrZero(val)
  } else if (kind === 'product-rate') {
    const key = el.dataset.key
    const num = toFloatOrZero(val)
    mpEdit.assumptions.products[+el.dataset.idx][key] = ['ctr', 'cr', 'atc'].includes(key) ? num / 100 : num
  } else if (kind === 'phase-weight') {
    mpEdit.assumptions.phaseWeights[el.dataset.phase] = toFloatOrZero(val)
  } else if (kind === 'weekend-mult') {
    mpEdit.assumptions.weekendMultiplier = toFloatOrZero(val)
  } else if (kind === 'phase-mult') {
    mpEdit.assumptions.phaseMultipliers[el.dataset.phase][el.dataset.key] = toFloatOrZero(val)
  } else if (kind === 'phase-roas-target') {
    if (!mpEdit.assumptions.roasTargetByPhase) mpEdit.assumptions.roasTargetByPhase = {}
    mpEdit.assumptions.roasTargetByPhase[el.dataset.phase] = val === '' ? null : toFloatOrZero(val)
  } else if (kind === 'day-phase') {
    mpEdit.dailyPlan[+el.dataset.idx].phase = val
  } else if (kind === 'day-weight') {
    mpEdit.dailyPlan[+el.dataset.idx].weightOverride = toFloatOrZero(val)
  } else if (kind === 'day-budget') {
    applyDayBudgetOverride(mpEdit, +el.dataset.idx, toFloatOrZero(val))
  } else if (kind === 'day-product-ratio') {
    applyDayProductRatioOverride(mpEdit, +el.dataset.idx, +el.dataset.pidx, toFloatOrZero(val) / 100)
  } else if (kind === 'global-product-ratio') {
    applyGlobalProductRatioOverride(mpEdit, +el.dataset.pidx, toFloatOrZero(val) / 100)
  } else if (kind === 'phase-budget-pct') {
    applyPhaseBudgetPctOverride(mpEdit, el.dataset.phase, toFloatOrZero(val) / 100)
  } else if (kind === 'day-note') {
    mpEdit.dailyPlan[+el.dataset.idx].note = val
  } else if (kind === 'hourly-rep-budget') {
    if (el.dataset.group === 'normal') mpEdit.hourlyPlan.normalRepBudget = toFloatOrZero(val)
    else mpEdit.hourlyPlan.bigSaleRepBudget = toFloatOrZero(val)
  } else if (kind === 'hourly-day-picker') {
    if (!val) return
    const planResult = computePlan(mpEdit.assumptions, mpEdit.dailyPlan)
    const row = planResult.rows.find((r) => r.date === val)
    if (!row) return
    if (el.dataset.group === 'normal') mpEdit.hourlyPlan.normalRepBudget = row.totalBudget
    else mpEdit.hourlyPlan.bigSaleRepBudget = row.totalBudget
  } else if (kind === 'hourly-slot') {
    const group = el.dataset.group, idx = +el.dataset.idx, key = el.dataset.key
    const slot = mpEdit.hourlyPlan[group][idx]
    slot[key] = key === 'pct' ? toFloatOrZero(val) / 100 : val
  } else {
    return
  }

  scheduleMpAutosave()
  renderMediaPlanDetail(true)
}

/* ---- Xu ly click cho cac nut hanh dong (Them/Xoa san pham, Dat lai Tu dong)
   - gan 1 lan duy nhat tren #mp_detail luc initMediaPlanPage, tuong tu
   handleMpFieldChange nhung cho su kien 'click' (button khong bao 'change'). */
function handleMpDetailClick(e) {
  const el = e.target.closest('[data-mp-action]')
  if (!el || !mpEdit) return
  const action = el.dataset.mpAction

  if (action === 'reset-normal-rep-budget') {
    mpEdit.hourlyPlan.normalRepBudget = null
  } else if (action === 'reset-day-weight') {
    mpEdit.dailyPlan[+el.dataset.idx].weightOverride = null
  } else if (action === 'reset-day-ratio') {
    mpEdit.dailyPlan[+el.dataset.idx].productRatioOverride = null
  } else if (action === 'reset-all-day-ratios') {
    mpEdit.dailyPlan.forEach((d) => { d.productRatioOverride = null })
  } else if (action === 'reset-phase-multipliers') {
    if (!confirm('Đặt lại Hệ số nhân theo Giai đoạn về mặc định chuẩn ngành? (Sale CPC×1.2/CTR×1.35/CR×1.6/ATC×1.45, Pre-heat và Sustain tương ứng, Normal ×1)')) return
    mpEdit.assumptions.phaseMultipliers = JSON.parse(JSON.stringify(MP_DEFAULT_ASSUMPTIONS.phaseMultipliers))
  } else if (action === 'add-product') {
    const n = mpEdit.assumptions.products.length + 1
    mpEdit.assumptions.products.push({ name: `Sản phẩm ${n}`, budgetMonthly: 0, cpc: 0, ctr: 0, cr: 0, atc: 0, aov: 0 })
  } else if (action === 'remove-product') {
    const idx = +el.dataset.idx
    if (mpEdit.assumptions.products.length <= 1) { alert('Kế hoạch cần ít nhất 1 sản phẩm.'); return }
    if (!confirm(`Xóa sản phẩm "${mpEdit.assumptions.products[idx].name}" khỏi Kế hoạch? (Ngân sách các sản phẩm còn lại giữ nguyên, bạn có thể chỉnh lại Tổng ngân sách nếu cần.)`)) return
    mpEdit.assumptions.products.splice(idx, 1)
  } else {
    return
  }

  scheduleMpAutosave()
  renderMediaPlanDetail(true)
}

function scheduleMpAutosave() {
  if (!mpEdit) return
  mpEdit.saveStatus = 'dirty'
  clearTimeout(mpEdit.saveTimer)
  mpEdit.saveTimer = setTimeout(saveMpNow, 900)
}

async function saveMpNow() {
  if (!mpEdit) return
  mpEdit.saveStatus = 'saving'
  updateMpSaveStatusBadge()
  try {
    const summary = buildPlanSummaryFields(mpEdit.assumptions, mpEdit.dailyPlan)
    const { error } = await sb.from('media_plans').update({
      assumptions: mpEdit.assumptions,
      daily_plan: mpEdit.dailyPlan,
      hourly_plan: mpEdit.hourlyPlan,
      ...summary
    }).eq('id', mpEdit.plan.id)
    if (error) throw error
    mpEdit.saveStatus = 'saved'
    mpEdit.lastSavedAt = new Date()
  } catch (err) {
    mpEdit.saveStatus = 'error'
    mpEdit.saveError = err.message
  }
  updateMpSaveStatusBadge()
}

function updateMpSaveStatusBadge() {
  const el = document.getElementById('mp_saveStatus')
  if (!el || !mpEdit) return
  const MAP = {
    idle: '<span class="text-gray-400">Chưa có thay đổi</span>',
    dirty: '<span class="text-gray-400">● Có thay đổi chưa lưu...</span>',
    saving: '<span class="text-blue-500">⏳ Đang lưu...</span>',
    saved: `<span class="text-green-600">✅ Đã lưu lúc ${mpEdit.lastSavedAt ? mpEdit.lastSavedAt.toLocaleTimeString('vi-VN') : ''}</span>`,
    error: `<span class="text-red-600">⚠️ Lỗi lưu: ${escapeHtml(mpEdit.saveError || '')} <button id="mp_retrySaveBtn" class="underline">Thử lại</button></span>`
  }
  el.innerHTML = MAP[mpEdit.saveStatus] || ''
  document.getElementById('mp_retrySaveBtn')?.addEventListener('click', saveMpNow)
}

   theo chuan Giai doan trong Ke hoach - dung cong thuc ROAS=CR*AOV/CPC
   (giong co che "ROAS muc tieu theo Giai doan" ben trang Ke hoach thang).
   ----------------------------------------------------------------------- */
const COLUMNS_DAILY = [
  { header: 'Ngày', key: 'ngay', type: 'int' },
  ...COLUMNS.filter((c) => c.key !== 'cot_an')
]
const REQUIRED_KEYS_DAILY = ['ngay', 'thang', 'nam', 'ten_dich_vu_hien_thi']

/** Doc + validate + chuan hoa file "Data ad TX.xlsx" (co cot Ngay that) */
async function parseAdsDailyFile(file, shopName) {
  const rawRows = await readRawRows(file)
  const headerIdx = findHeaderRowIndex(rawRows, COLUMNS_DAILY)

  if (headerIdx === -1) {
    return {
      headerValid: false,
      missingColumns: COLUMNS_DAILY.map((c) => c.header),
      rows: [],
      errors: [{ row: 0, message: 'Không tìm thấy dòng tiêu đề đúng định dạng (Ngày, Tháng, Năm, ...).' }],
      totalDataRows: 0
    }
  }

  const headerRow = (rawRows[headerIdx] || []).map((h) => nfc(String(h ?? '').trim()))
  const missingColumns = COLUMNS_DAILY.filter((c) => !headerRow.includes(nfc(c.header))).map((c) => c.header)
  const headerValid = missingColumns.length === 0

  const colIndexByKey = {}
  COLUMNS_DAILY.forEach((c) => { colIndexByKey[c.key] = headerRow.indexOf(nfc(c.header)) })

  const dataRows = rawRows.slice(headerIdx + 1).filter((r) => r && r.some((cell) => cell !== null && cell !== undefined && cell !== ''))

  const rows = [], errors = []
  dataRows.forEach((raw, i) => {
    const rowNum = headerIdx + 2 + i
    const obj = { shop_name: shopName, source_file_name: file.name }
    let hasError = false
    COLUMNS_DAILY.forEach((col) => {
      const idx = colIndexByKey[col.key]
      obj[col.key] = CASTERS[col.type](idx >= 0 ? raw[idx] : null)
    })
    REQUIRED_KEYS_DAILY.forEach((key) => {
      if (obj[key] === null || obj[key] === undefined || obj[key] === '') {
        hasError = true
        errors.push({ row: rowNum, message: `Thiếu giá trị bắt buộc cho cột "${key}".` })
      }
    })
    if (!hasError) rows.push(obj)
  })

  return { headerValid, missingColumns, rows, errors, totalDataRows: dataRows.length }
}

const TABLE_DAILY = 'ads_daily_reports'

async function syncAdsDailyToSupabase(rows, { fileName, shopName, userId, onProgress }) {
  const totalRows = rows.length

  const { data: historyRow, error: historyError } = await sb
    .from('upload_history')
    .insert({ file_name: fileName, shop_name: shopName, uploaded_by: userId, total_rows: totalRows, status: 'processing' })
    .select().single()
  if (historyError) throw historyError

  const { count: countBefore } = await sb.from(TABLE_DAILY).select('id', { count: 'exact', head: true }).eq('shop_name', shopName)

  let processed = 0
  const failedBatches = []
  for (let i = 0; i < rows.length; i += BATCH_SIZE) {
    const batch = rows.slice(i, i + BATCH_SIZE)
    const { error } = await sb.from(TABLE_DAILY).upsert(batch, { onConflict: 'row_key', ignoreDuplicates: false })
    if (error) failedBatches.push({ batchStart: i, batchSize: batch.length, message: error.message })
    processed += batch.length
    onProgress?.(Math.round((processed / totalRows) * 100))
  }

  const { count: countAfter } = await sb.from(TABLE_DAILY).select('id', { count: 'exact', head: true }).eq('shop_name', shopName)
  const insertedRows = Math.max(0, (countAfter ?? 0) - (countBefore ?? 0))
  const errorRows = failedBatches.reduce((sum, b) => sum + b.batchSize, 0)
  const updatedRows = Math.max(0, totalRows - insertedRows - errorRows)
  const status = failedBatches.length === 0 ? 'success' : (insertedRows + updatedRows > 0 ? 'partial' : 'failed')
  const errorMessage = failedBatches.length ? failedBatches[0].message : null

  await sb.from('upload_history').update({
    inserted_rows: insertedRows, updated_rows: updatedRows, error_rows: errorRows,
    status, error_detail: failedBatches.length ? { failedBatches } : null, finished_at: new Date().toISOString()
  }).eq('id', historyRow.id)

  return { insertedRows, updatedRows, errorRows, status, errorMessage }
}

/** Gop cac dong (nhieu campaign/tu khoa) ve 1 dong TONG cho moi ngay that */
function computeDailyActual(rows) {
  const impressions = sumBy(rows, 'so_luot_xem')
  const clicks = sumBy(rows, 'so_luot_click')
  const orders = sumBy(rows, 'san_pham_da_ban')
  const revenue = sumBy(rows, 'doanh_so')
  const cost = sumBy(rows, 'chi_phi')
  const atc = sumBy(rows, 'add_to_cart')
  return {
    impressions, clicks, orders, revenue, cost, atc,
    cpc: clicks > 0 ? cost / clicks : 0,
    ctr: impressions > 0 ? clicks / impressions : 0, // ty le (0-1), NHAN 100 khi hien thi
    cr: clicks > 0 ? orders / clicks : 0,             // ty le (0-1) - tinh theo DON HANG (khop dinh nghia CR ben Ke hoach thang)
    cpa: orders > 0 ? cost / orders : 0,
    roas: cost > 0 ? revenue / cost : 0,
    acos: revenue > 0 ? (cost / revenue) * 100 : 0
  }
}

function groupAdsDailyByDay(rows) {
  const map = new Map()
  rows.forEach((r) => {
    const key = r.report_date || `${r.nam}-${pad2(r.thang)}-${pad2(r.ngay)}`
    if (!map.has(key)) map.set(key, [])
    map.get(key).push(r)
  })
  return Array.from(map.entries())
    .map(([date, groupRows]) => ({ date, ...computeDailyActual(groupRows) }))
    .sort((a, b) => (a.date > b.date ? 1 : -1))
}

/** Loi khuyen tu dong theo chuan nganh (BENCHMARKS) + so sanh voi ngay lien truoc */
function aaDailyAdvice(cur, prev) {
  const parts = []
  if (evalBenchmark('roas', cur.roas).label === 'Cần cải thiện') parts.push('ROAS thấp — cân nhắc loại bớt từ khóa/vị trí kém hiệu quả')
  if (evalBenchmark('ctr', cur.ctr * 100).label === 'Thấp') parts.push('CTR thấp — xem lại hình ảnh/tiêu đề quảng cáo')
  if (evalBenchmark('cvr', cur.cr * 100).label === 'Thấp') parts.push('Tỷ lệ chuyển đổi thấp — kiểm tra giá bán/trang sản phẩm')
  if (prev) {
    const dRoas = pctChange(prev.roas, cur.roas)
    if (dRoas !== null && dRoas < -15) parts.push(`ROAS giảm mạnh ${Math.abs(dRoas).toFixed(0)}% so với ngày trước`)
    const dCost = pctChange(prev.cost, cur.cost)
    if (dCost !== null && dCost > 30 && (dRoas === null || dRoas <= 0)) parts.push('Ngân sách tăng nhưng hiệu quả chưa tăng tương ứng')
  }
  return parts.length ? parts.join('; ') + '.' : 'Ổn định — tiếp tục theo dõi.'
}

async function handleAaFileSelected(file) {
  if (!file) return
  if (!/\.(xlsx|xls|csv)$/i.test(file.name)) { alert('Chỉ hỗ trợ file .xlsx, .xls hoặc .csv'); return }

  aaState.file = file
  showAaStep('parsing')
  document.getElementById('aa_parsing').innerHTML = progressBarHTML(40, `Đang đọc file ${file.name}...`)

  try {
    const shopName = document.getElementById('aa_shopName').value || 'Default Shop'
    const result = await parseAdsDailyFile(file, shopName)
    aaState.parseResult = result
    renderAaReview(result)
    showAaStep('review')
  } catch (err) {
    alert('Lỗi đọc file: ' + err.message)
    showAaStep('idle')
  }
}

function showAaStep(step) {
  ;['parsing', 'review', 'syncing', 'done'].forEach((s) => document.getElementById(`aa_${s}`).classList.add('hidden-important'))
  if (step !== 'idle') document.getElementById(`aa_${step}`).classList.remove('hidden-important')
}

    loadAdsAnalysisData()
  } catch (err) {
    alert('Lỗi đồng bộ Supabase: ' + err.message)
    showAaStep('review')
  }
}

function resetAaUpload() {
  aaState.file = null; aaState.parseResult = null
  document.getElementById('aa_fileInput').value = ''
  showAaStep('idle')
}

async function loadAdsAnalysisData() {
  const shopName = document.getElementById('aa_shopName')?.value || 'Default Shop'
  const thang = Number(document.getElementById('aa_thang').value) || (new Date().getMonth() + 1)
  const nam = Number(document.getElementById('aa_nam').value) || new Date().getFullYear()
  aaState.shopName = shopName; aaState.thang = thang; aaState.nam = nam

  document.getElementById('aa_summary').innerHTML = '<p class="text-sm text-gray-400">Đang tải dữ liệu...</p>'

  try {
    const { data: dailyRows, error: dailyErr } = await sb.from('ads_daily_reports').select('*')
      .eq('shop_name', shopName).eq('thang', thang).eq('nam', nam).order('ngay', { ascending: true }).limit(20000)
    if (dailyErr) throw dailyErr
    aaState.rawRows = dailyRows || []

    const monthStart = `${nam}-${pad2(thang)}-01`
    const monthEnd = toISODate(new Date(nam, thang, 0))
    const { data: refRows, error: refErr } = await sb.from('ads_daily_roas_ref').select('*')
      .eq('shop_name', shopName).gte('report_date', monthStart).lte('report_date', monthEnd)
    aaState.roasRefMap = {}
    if (!refErr) (refRows || []).forEach((r) => { aaState.roasRefMap[r.report_date] = r.roas_ref })

    const { data: planRow } = await sb.from('media_plans').select('*')
      .eq('shop_name', shopName).eq('thang', thang).eq('nam', nam).maybeSingle()
    aaState.plan = planRow || null
    aaState.planResult = (planRow && planRow.assumptions && planRow.daily_plan) ? computePlan(planRow.assumptions, planRow.daily_plan) : null

    renderAdsAnalysis()
  } catch (err) {
    document.getElementById('aa_summary').innerHTML = `<p class="text-sm text-red-500">Lỗi tải dữ liệu: ${escapeHtml(err.message)}</p>`
  }
}

function aaKpiCardsHTML(kpi) {
  const defs = [
    { key: 'revenue', label: 'Doanh thu', fmt: formatVND },
    { key: 'cost', label: 'Chi phí Ads', fmt: formatVND },
    { key: 'roas', label: 'ROAS', fmt: (v) => v.toFixed(2) + 'x' },
    { key: 'acos', label: 'ACOS', fmt: formatPercent },
    { key: 'ctr', label: 'CTR', fmt: formatPercent },
    { key: 'cvr', label: 'CVR', fmt: formatPercent },
    { key: 'cpc', label: 'CPC', fmt: formatVND },
    { key: 'cpa', label: 'CPA', fmt: formatVND },
    { key: 'orders', label: 'Đơn hàng', fmt: formatNumber },
    { key: 'impressions', label: 'Lượt hiển thị', fmt: formatNumber },
    { key: 'clicks', label: 'Lượt click', fmt: formatNumber }
  ]
  return `<div class="grid grid-cols-2 gap-3 sm:grid-cols-5">${defs.map((d) => `
    <div class="card p-3 bg-white dark:bg-gray-900 border-gray-200 dark:border-gray-800">
      <p class="text-xs text-gray-400">${d.label}</p>
      <p class="mt-1 text-lg font-bold">${d.fmt(kpi[d.key])}</p>

}

function renderAaTrendChart(dailyRows) {
  const labels = dailyRows.map((d) => { const [, m, dd] = d.date.split('-'); return `${dd}/${m}` })
  if (aaCharts.trend) { aaCharts.trend.destroy(); delete aaCharts.trend }
  aaCharts.trend = new Chart(document.getElementById('aa_chartTrend'), {
    type: 'line',
    data: { labels, datasets: [
      { label: 'Chi phí', data: dailyRows.map((d) => d.cost), borderColor: '#3B82F6', backgroundColor: '#3B82F6', tension: 0.3, yAxisID: 'y' },
      { label: 'Doanh số', data: dailyRows.map((d) => d.revenue), borderColor: '#EE4D2D', backgroundColor: '#EE4D2D', tension: 0.3, yAxisID: 'y' },
      { label: 'ROAS (x)', data: dailyRows.map((d) => d.roas), borderColor: '#10B981', backgroundColor: '#10B981', tension: 0.3, yAxisID: 'y1' }
    ] },
    options: {
      responsive: true, plugins: { legend: { position: 'bottom' } },
      scales: {
        y: { position: 'left', title: { display: true, text: 'đ' } },
        y1: { position: 'right', title: { display: true, text: 'ROAS (x)' }, grid: { drawOnChartArea: false } }
      }
    }
  })
}

      <th class="py-2 pr-3 font-medium text-gray-400">Lượt hiển thị</th>
      <th class="py-2 pr-3 font-medium text-gray-400">Lượt click</th>
      <th class="py-2 pr-3 font-medium text-gray-400">Chi phí</th>
      <th class="py-2 pr-3 font-medium text-gray-400">Doanh số</th>

      <th class="py-2 pr-3 font-medium text-gray-400">ACOS</th>

      <th class="py-2 pr-3 font-medium text-gray-400 min-w-[240px]">Đánh giá tự động</th>
    </tr></thead>
    <tbody>${dailyRows.map((d, i) => {
      const prev = i > 0 ? dailyRows[i - 1] : null

}

function aaPlanVsActualTableHTML(dailyRows) {
  if (!aaState.planResult) {
    return `<p class="text-sm text-gray-400">Chưa có Kế hoạch tháng nào được lưu cho Shop "${escapeHtml(aaState.shopName)}" — Tháng ${pad2(aaState.thang)}/${aaState.nam}. Hãy Upload Kế hoạch tháng tương ứng ở mục "📅 Kế hoạch tháng" để so sánh.</p>`
  }
  if (!dailyRows.length) return '<p class="text-sm text-gray-400">Chưa có dữ liệu thực tế theo ngày để đối chiếu.</p>'

  const planByDate = {}
  aaState.planResult.rows.forEach((r) => { planByDate[r.date] = r })

  return `<table class="w-full text-left text-sm">
    <thead><tr class="border-b border-gray-200 dark:border-gray-800">
      <th class="py-2 pr-3 font-medium text-gray-400">Ngày</th>
      <th class="py-2 pr-3 font-medium text-gray-400">Giai đoạn</th>
      <th class="py-2 pr-3 font-medium text-gray-400">Ngân sách thực chi</th>
      <th class="py-2 pr-3 font-medium text-gray-400 min-w-[100px]">ROAS tham chiếu</th>
      <th class="py-2 pr-3 font-medium text-gray-400">ROAS thực tế</th>
      <th class="py-2 pr-3 font-medium text-gray-400">Hiển thị (T.chiếu / T.tế)</th>
      <th class="py-2 pr-3 font-medium text-gray-400">Click (T.chiếu / T.tế)</th>
      <th class="py-2 pr-3 font-medium text-gray-400">CPC (T.chiếu / T.tế)</th>
      <th class="py-2 pr-3 font-medium text-gray-400">CTR (T.chiếu / T.tế)</th>
      <th class="py-2 pr-3 font-medium text-gray-400">CR (T.chiếu / T.tế)</th>
      <th class="py-2 pr-3 font-medium text-gray-400">ATC (T.chiếu / T.tế)</th>
      <th class="py-2 pr-3 font-medium text-gray-400">CPA (T.chiếu / T.tế)</th>
      <th class="py-2 pr-3 font-medium text-gray-400">Đơn (T.chiếu / T.tế)</th>
      <th class="py-2 pr-3 font-medium text-gray-400">GMV (T.chiếu / T.tế)</th>
    </tr></thead>
    <tbody>${dailyRows.map((d) => {
      const planDay = planByDate[d.date]
      const [y, m, dd] = d.date.split('-')
      const roasRef = aaState.roasRefMap[d.date]
      let refCalc = null
      if (planDay && roasRef !== null && roasRef !== undefined && roasRef !== '' && d.cost > 0) {
        const cpcRef = planDay.blendedCpc, ctrRef = planDay.blendedCtr, atcRateRef = planDay.blendedAtc
        const aovRef = planDay.totalOrder > 0 ? planDay.totalGMV / planDay.totalOrder : 0
        const crRef = (cpcRef > 0 && aovRef > 0) ? (Number(roasRef) * cpcRef / aovRef) : 0
        const clickRef = cpcRef > 0 ? d.cost / cpcRef : 0
        const imprRef = ctrRef > 0 ? clickRef / ctrRef : 0
        const orderRef = clickRef * crRef
        const gmvRef = orderRef * aovRef
        const atcRef = clickRef * atcRateRef
        const cpaRef = orderRef > 0 ? d.cost / orderRef : 0
        refCalc = { cpcRef, ctrRef, crRef, atcRef, cpaRef, orderRef, gmvRef, clickRef, imprRef }
      }
      const fmt2 = (refVal, actVal, fmtFn) => `<span class="text-gray-400">${refCalc ? fmtFn(refVal) : '—'}</span> / <span class="font-medium">${fmtFn(actVal)}</span>`
      return `<tr class="border-b border-gray-200 dark:border-gray-800 last:border-0">
        <td class="py-1.5 pr-3 whitespace-nowrap font-medium">${dd}/${m}/${y}</td>
        <td class="py-1.5 pr-3 whitespace-nowrap">${planDay ? `<span class="rounded px-1.5 py-0.5 text-xs ${MP_PHASE_BADGE[planDay.phase] || ''}">${planDay.phase}</span>` : '<span class="text-gray-400">—</span>'}</td>
        <td class="py-1.5 pr-3 whitespace-nowrap">${formatVND(d.cost)}</td>
        <td class="py-1.5 pr-3 whitespace-nowrap"><input type="number" step="0.1" data-aa="roas-ref" data-date="${d.date}" value="${roasRef ?? ''}" placeholder="vd 8" class="w-20 rounded border px-2 py-1 text-sm border-gray-300 dark:border-gray-700 dark:bg-gray-800" /></td>
        <td class="py-1.5 pr-3 whitespace-nowrap font-medium">${d.roas.toFixed(2)}x</td>
        <td class="py-1.5 pr-3 whitespace-nowrap text-xs">${fmt2(refCalc?.imprRef, d.impressions, formatNumber)}</td>
        <td class="py-1.5 pr-3 whitespace-nowrap text-xs">${fmt2(refCalc?.clickRef, d.clicks, formatNumber)}</td>
        <td class="py-1.5 pr-3 whitespace-nowrap text-xs">${fmt2(refCalc?.cpcRef, d.cpc, formatVND)}</td>
        <td class="py-1.5 pr-3 whitespace-nowrap text-xs">${fmt2((refCalc?.ctrRef || 0) * 100, d.ctr * 100, formatPercent)}</td>
        <td class="py-1.5 pr-3 whitespace-nowrap text-xs">${fmt2((refCalc?.crRef || 0) * 100, d.cr * 100, formatPercent)}</td>
        <td class="py-1.5 pr-3 whitespace-nowrap text-xs">${fmt2(refCalc?.atcRef, d.atc, formatNumber)}</td>
        <td class="py-1.5 pr-3 whitespace-nowrap text-xs">${fmt2(refCalc?.cpaRef, d.cpa, formatVND)}</td>
        <td class="py-1.5 pr-3 whitespace-nowrap text-xs">${fmt2(refCalc?.orderRef, d.orders, formatNumber)}</td>
        <td class="py-1.5 pr-3 whitespace-nowrap text-xs">${fmt2(refCalc?.gmvRef, d.revenue, formatVND)}</td>
      </tr>`
    }).join('')}</tbody></table>
  <p class="mt-2 text-xs text-gray-400">Cột "T.chiếu / T.tế" = giá trị Tham chiếu (tính từ ô ROAS tham chiếu, giữ CPC/CTR/ATC/AOV theo chuẩn Giai đoạn trong Kế hoạch, áp trên đúng Ngân sách thực chi ngày đó) / giá trị Thực tế đã đạt. Bỏ trống ô ROAS tham chiếu để ẩn cột Tham chiếu (hiện "—").</p>`
}

async function handleAaFieldChange(e) {
  const el = e.target
  if (el.dataset.aa !== 'roas-ref') return
  const date = el.dataset.date
  const raw = el.value.trim()
  const value = raw === '' ? null : Number(raw)
  aaState.roasRefMap[date] = value
  try {
    if (value === null) {
      await sb.from('ads_daily_roas_ref').delete().eq('shop_name', aaState.shopName).eq('report_date', date)
    } else {
      await sb.from('ads_daily_roas_ref').upsert({ shop_name: aaState.shopName, report_date: date, roas_ref: value }, { onConflict: 'shop_name,report_date' })
    }
  } catch (err) {
    alert('Lỗi lưu ROAS tham chiếu: ' + err.message)
  }
  renderAdsAnalysis()
}

function renderAdsAnalysis() {
  const rows = aaState.rawRows
  const kpi = computeKpis(rows)
  document.getElementById('aa_summary').innerHTML = aaKpiCardsHTML(kpi)

  const dailyRows = groupAdsDailyByDay(rows)
  renderAaTrendChart(dailyRows)
  document.getElementById('aa_dailyTable').innerHTML = aaDailyTableHTML(dailyRows)
  document.getElementById('aa_planVsActual').innerHTML = aaPlanVsActualTableHTML(dailyRows)
}
